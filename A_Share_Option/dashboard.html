<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A股期权 Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #fff;
      --line: #ccd6e3;
      --soft: #edf3fb;
      --text: #142033;
      --muted: #65758b;
      --blue: #155eef;
      --red: #b42318;
      --green: #087443;
      --amber: #ad5b2b;
      --shadow: 0 6px 18px rgba(21, 34, 52, 0.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      font-size: 13px;
    }
    button, input, select { font: inherit; }
    button {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 4px 9px;
      cursor: pointer;
    }
    button:hover { border-color: #99a8bb; }
    button.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    button.danger { color: var(--red); border-color: #e6b8b4; background: #fff7f6; }
    .toolbar-link { display: inline-flex; align-items: center; justify-content: center; min-height: 30px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--text); padding: 4px 9px; text-decoration: none; white-space: nowrap; }
    .toolbar-link:hover { border-color: #99a8bb; }
    input, select {
      width: 100%;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 4px 8px;
    }
    input[readonly] { background: #f8fafc; color: var(--muted); }
    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
    }
    .shell { min-height: 100vh; }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 247, 251, 0.97);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .topbar {
      max-width: 1880px;
      margin: 0 auto;
      padding: 12px 18px;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 14px;
      align-items: center;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }
    .subline {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }
    .toolbar {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(108px, max-content);
      gap: 8px;
      align-items: end;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      color: var(--muted);
      white-space: nowrap;
    }
    .toggle input { width: auto; min-height: auto; }
    main {
      max-width: 1880px;
      margin: 0 auto;
      padding: 14px 18px 22px;
      display: grid;
      gap: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    .panel h2 { margin: 0; font-size: 15px; letter-spacing: 0; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      white-space: nowrap;
      font-size: 12px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #98a2b3; }
    .dot.ok { background: var(--green); }
    .dot.bad { background: var(--red); }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 12px;
      padding: 12px 14px;
    }
    .product-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      background: #fff;
    }
    .product-card.active { border: 2px solid var(--blue); padding: 11px; }
    .product-card.disabled { opacity: 0.55; cursor: default; }
    .product-title {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .product-title strong { font-size: 18px; }
    .product-title span { color: var(--muted); font-size: 12px; text-align: right; }
    .mini-metrics {
      display: grid;
      grid-template-columns: repeat(9, minmax(76px, 1fr));
      gap: 7px;
    }
    .mini-metric {
      border: 1px solid #e4eaf2;
      border-radius: 6px;
      padding: 7px 8px;
      min-height: 48px;
      background: #fbfdff;
    }
    .mini-metric span { display: block; color: var(--muted); font-size: 11px; }
    .mini-metric strong { display: block; margin-top: 3px; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .work-grid {
      display: grid;
      grid-template-columns: minmax(820px, 1.35fr) minmax(430px, 0.65fr);
      gap: 14px;
      align-items: start;
    }
    .chain-controls {
      display: grid;
      grid-template-columns: 116px 116px 1fr 120px;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      align-items: end;
    }
    .chain-wrap {
      overflow: auto;
      max-height: calc(100vh - 320px);
      padding: 10px 12px 12px;
    }
    .expiry-block { margin-bottom: 14px; min-width: 980px; }
    .expiry-title {
      display: grid;
      grid-template-columns: 1fr 88px 1fr;
      gap: 6px;
      align-items: center;
      margin-bottom: 5px;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }
    .chain-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 4px;
      table-layout: fixed;
    }
    .chain-table th {
      position: sticky;
      top: -10px;
      z-index: 2;
      background: #f8fbff;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 6px;
      font-size: 11px;
    }
    .chain-table td {
      border: 1px solid #d9e2ee;
      padding: 7px 8px;
      vertical-align: middle;
      min-height: 54px;
      background: #fff;
    }
    .call-cell, .put-cell { cursor: pointer; }
    .call-cell:hover, .put-cell:hover { background: #f0f7ff; border-color: #9db7e8; }
    .call-cell.has-position, .put-cell.has-position { background: #eaf2ff; border-color: var(--blue); }
    .strike-cell {
      width: 88px;
      text-align: center;
      color: var(--blue);
      font-size: 15px;
      font-weight: 800;
      background: #f8fbff !important;
    }
    .underlying-row td {
      border-style: dashed;
      background: #f3fff7 !important;
    }
    .underlying-marker {
      display: inline-block;
      border: 1px solid #a7dfbd;
      background: #e7f8ee;
      color: var(--green);
      border-radius: 6px;
      padding: 6px 9px;
      font-weight: 800;
    }
    .cell-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-weight: 700;
    }
    .cell-top .code { color: var(--muted); font-weight: 600; font-size: 11px; }
    .quote-line, .greek-line, .pos-line {
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .quick-actions { display: inline-flex; gap: 3px; }
    .quick-actions button {
      min-height: 22px;
      width: 24px;
      padding: 0;
      border-radius: 5px;
      font-size: 12px;
    }
    .side-call { color: var(--green); }
    .side-put { color: var(--red); }
    .up { color: var(--red); }
    .down { color: var(--green); }
    .muted { color: var(--muted); }
    .right-stack { display: grid; gap: 14px; }
    .editor {
      padding: 12px 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }
    .editor .wide { grid-column: span 3; }
    .editor-actions {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }
    table.simple {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    table.simple th, table.simple td {
      border-bottom: 1px solid #edf1f6;
      padding: 7px 8px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    table.simple th {
      color: var(--muted);
      background: #f8fbff;
      font-size: 11px;
      font-weight: 700;
    }
    table.simple .left { text-align: left; }
    .positions-wrap { max-height: 260px; overflow: auto; }
    .inventory-node {
      padding: 12px 14px;
      overflow: auto;
    }
    .inventory-note { color: var(--muted); margin-bottom: 10px; }
    .node-grid { min-width: 960px; display: grid; gap: 4px; }
    .node-row {
      display: grid;
      grid-template-columns: 1fr 86px 1fr;
      gap: 6px;
      align-items: stretch;
    }
    .node-cell, .node-strike {
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 8px;
    }
    .node-cell.empty { border-style: dashed; color: #b4bdca; }
    .node-cell.active { background: #eaf2ff; border-color: #8fb2ff; }
    .node-strike {
      text-align: center;
      color: var(--blue);
      font-weight: 800;
      display: grid;
      place-items: center;
      background: #f8fbff;
    }
    .node-row.underlying .node-strike {
      color: var(--green);
      background: #e7f8ee;
      border-color: #a7dfbd;
    }
    .empty-state { padding: 22px; text-align: center; color: var(--muted); }
    /* Dense terminal-style option chain: values stay on one horizontal row. */
    .chain-wrap {
      padding: 0;
      background: #101821;
      border-radius: 0 0 8px 8px;
    }
    .chain-wrap .empty-state { color: #a9b8ca; }
    .expiry-block { min-width: 1260px; margin: 0; }
    .chain-table {
      min-width: 1260px;
      border-collapse: collapse;
      border-spacing: 0;
      table-layout: auto;
      font-family: "Cascadia Mono", Consolas, "Microsoft YaHei", monospace;
      font-variant-numeric: tabular-nums;
    }
    .chain-table th {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 6px 5px;
      color: #aab8ca;
      background: #1a2633;
      border: 1px solid #314254;
      font-size: 11px;
      font-weight: 600;
      text-align: right;
      white-space: nowrap;
    }
    .chain-table .chain-group-row th {
      top: 0;
      z-index: 3;
      padding: 7px 6px;
      color: #d8e4f2;
      background: #15202c;
      text-align: center;
      font-size: 12px;
    }
    .chain-table thead tr:nth-child(2) th { top: 33px; z-index: 2; }
    .chain-table .call-head { color: #63d6a3; }
    .chain-table .put-head { color: #ff8d86; }
    .chain-table .strike-head { background: #263545; color: #d9e6f5; }
    .chain-table td {
      min-width: 64px;
      height: 34px;
      padding: 5px 6px;
      color: #d7e1ed;
      background: #101821;
      border: 1px solid #263747;
      font-size: 12px;
      line-height: 1.15;
      text-align: right;
      vertical-align: middle;
      white-space: nowrap;
    }
    .chain-table .option-data { cursor: pointer; }
    .chain-table .call-data:hover { background: #153128; }
    .chain-table .put-data:hover { background: #352024; }
    .chain-table .has-position { background: #1b304c; box-shadow: inset 0 0 0 1px #4f8cff; }
    .chain-table .empty-data { color: #506176; }
    .chain-table .contract-data { min-width: 122px; text-align: left; }
    .chain-table .strike-cell {
      min-width: 72px;
      color: #e7edf7;
      background: #243445 !important;
      border-color: #4b6074;
      font-size: 13px;
      text-align: center;
    }
    .chain-table .underlying-row td {
      height: 31px;
      background: #133227 !important;
      border-color: #2e7759;
      text-align: center;
    }
    .chain-table .underlying-marker {
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #92e6bc;
      padding: 0;
      font-size: 12px;
      font-weight: 700;
    }
    .contract-line { display: flex; align-items: center; gap: 5px; }
    .contract-code { color: #d7e1ed; font-size: 11px; }
    .position-badge { color: #9fc5ff; font-style: normal; font-weight: 700; }
    .quick-actions { margin-left: auto; display: inline-flex; gap: 3px; }
    .quick-actions button {
      min-height: 20px;
      width: 20px;
      padding: 0;
      border-color: #51657b;
      border-radius: 3px;
      background: #203040;
      color: #eef5ff;
      line-height: 1;
    }
    .quick-actions button:hover { background: #2f4b66; }
    .positions-wrap { max-height: 320px; }
    table.simple .position-actions { padding: 5px 6px; overflow: visible; }
    .position-actions > div { display: flex; justify-content: flex-end; gap: 4px; }
    .position-actions button { min-height: 26px; padding: 3px 7px; font-size: 12px; }
    @media (max-width: 1280px) {
      .topbar, .work-grid { grid-template-columns: 1fr; }
      .toolbar { grid-auto-flow: row; grid-template-columns: repeat(4, 1fr); }
      .product-grid { grid-template-columns: 1fr; }
      .chain-wrap { max-height: 620px; }
    }
    @media (max-width: 760px) {
      main { padding: 10px; }
      .toolbar, .chain-controls, .editor { grid-template-columns: 1fr 1fr; }
      .editor .wide { grid-column: span 2; }
      .mini-metrics { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="topbar">
        <div>
          <h1>A股期权 Dashboard</h1>
          <div class="subline" id="sourceLine">读取中</div>
        </div>
        <div class="toolbar">
          <label>Excel读取
            <select id="readModeSelect">
              <option value="auto">自动</option>
              <option value="live">Live Excel</option>
              <option value="saved">已保存文件</option>
            </select>
          </label>
          <label>合约乘数
            <input id="multiplierInput" type="number" value="10000" min="1" step="100" />
          </label>
          <label>刷新秒数
            <input id="pollInput" type="number" value="2" min="1" max="60" step="1" />
          </label>
          <label class="toggle"><input id="autoRefreshInput" type="checkbox" checked /> 自动刷新</label>
          <button id="refreshButton" class="primary">刷新</button>
          <a class="toolbar-link" href="arbitrage_monitor.html">套利监控</a>
          <button id="exportButton">导出持仓</button>
        </div>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panel-head">
          <h2>组合资产总览</h2>
          <span class="status"><i class="dot" id="statusDot"></i><span id="statusText">等待数据</span></span>
        </div>
        <div class="product-grid" id="productGrid"></div>
      </section>

      <section class="work-grid">
        <section class="panel">
          <div class="panel-head">
            <h2>期权链矩阵</h2>
            <span class="muted" id="chainHint">横向行情 | 点击任意行情单元格编辑持仓</span>
          </div>
          <div class="chain-controls">
            <label>品种
              <select id="productFilter"></select>
            </label>
            <label>到期
              <select id="matrixExpiryFilter"><option value="">全部</option></select>
            </label>
            <label>搜索
              <input id="searchInput" type="search" placeholder="代码 / strike" />
            </label>
            <label>展示
              <select id="matrixView">
                <option value="quote">报价</option>
                <option value="greeks">Greeks</option>
                <option value="liquidity">成交持仓</option>
              </select>
            </label>
          </div>
          <div class="chain-wrap" id="optionMatrix"></div>
        </section>

        <div class="right-stack">
          <section class="panel">
            <div class="panel-head">
              <h2>持仓编辑</h2>
              <span class="muted" id="draftHint">联动选择合约</span>
            </div>
            <div class="editor">
              <input id="positionId" type="hidden" />
              <label>品种
                <select id="positionProduct"></select>
              </label>
              <label>方向
                <select id="positionType">
                  <option value="认购">购</option>
                  <option value="认沽">沽</option>
                </select>
              </label>
              <label>到期日
                <select id="positionExpiry"></select>
              </label>
              <label>Strike
                <select id="positionStrike"></select>
              </label>
              <label>持仓
                <input id="positionQty" type="number" value="1" step="1" />
              </label>
              <label>开仓价
                <input id="positionOpen" type="number" step="0.0001" />
              </label>
              <label class="wide">代码
                <input id="positionCode" readonly />
              </label>
              <label class="wide">备注
                <input id="positionNote" />
              </label>
              <div class="editor-actions">
                <button id="clearDraftButton">清空</button>
                <button id="savePositionButton" class="primary">保存</button>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>当前持仓</h2>
              <span class="muted" id="positionCount">0 笔</span>
            </div>
            <div class="positions-wrap">
              <table class="simple">
                <thead>
                  <tr>
                    <th class="left" style="width:46px;">品种</th>
                    <th style="width:52px;">到期日</th>
                    <th style="width:42px;">方向</th>
                    <th style="width:58px;">持仓</th>
                    <th style="width:66px;">Strike</th>
                    <th style="width:66px;">开仓</th>
                    <th style="width:56px;">Bid</th>
                    <th style="width:56px;">Ask</th>
                    <th style="width:82px;">浮盈亏</th>
                    <th style="width:102px;">操作</th>
                  </tr>
                </thead>
                <tbody id="positionsBody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>当前库存行权节点</h2>
          <span class="muted" id="inventoryHint"></span>
        </div>
        <div class="inventory-node" id="inventoryNodes"></div>
      </section>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = {
      config: {},
      chain: [],
      chainMeta: {},
      positions: [],
      activeProduct: "创业",
      selectedKey: "",
      loading: false,
      pollTimer: null,
      editorSyncing: false,
    };
    const PRODUCT_SHEETS = { "创业": "创业板", "科创": "科创板" };
    const fields = {
      id: $("positionId"),
      product: $("positionProduct"),
      type: $("positionType"),
      expiry: $("positionExpiry"),
      strike: $("positionStrike"),
      qty: $("positionQty"),
      open: $("positionOpen"),
      code: $("positionCode"),
      note: $("positionNote"),
    };

    document.addEventListener("DOMContentLoaded", init);

    function init() {
      $("readModeSelect").addEventListener("change", loadChains);
      $("multiplierInput").addEventListener("input", render);
      $("pollInput").addEventListener("input", resetPolling);
      $("autoRefreshInput").addEventListener("change", resetPolling);
      $("refreshButton").addEventListener("click", loadChains);
      $("exportButton").addEventListener("click", exportPositions);
      $("productFilter").addEventListener("change", () => setActiveProduct($("productFilter").value));
      $("matrixExpiryFilter").addEventListener("change", render);
      $("searchInput").addEventListener("input", render);
      $("matrixView").addEventListener("change", render);
      fields.product.addEventListener("change", () => updateEditorOptions());
      fields.type.addEventListener("change", () => updateEditorOptions());
      fields.expiry.addEventListener("change", () => updateEditorOptions());
      fields.strike.addEventListener("change", syncEditorContract);
      $("clearDraftButton").addEventListener("click", () => clearDraft());
      $("savePositionButton").addEventListener("click", saveDraft);
      loadConfig();
      loadPositions();
      loadChains();
      resetPolling();
    }

    async function loadConfig() {
      try {
        const payload = await fetchJson("/api/config");
        state.config = payload;
        $("readModeSelect").value = payload.readMode || "auto";
        $("sourceLine").textContent = payload.excelPath || "";
      } catch (error) {
        $("sourceLine").textContent = String(error.message || error);
      }
    }

    async function loadChains() {
      if (state.loading) return;
      state.loading = true;
      setStatus("读取中", "ok");
      const mode = $("readModeSelect").value || "auto";
      try {
        const results = [];
        for (const [product, sheet] of Object.entries(PRODUCT_SHEETS)) {
          try {
            const payload = await fetchJson(`/api/chain?sheet=${encodeURIComponent(sheet)}&mode=${encodeURIComponent(mode)}&t=${Date.now()}`);
            if (!payload.ok) throw new Error(payload.error || `${sheet}读取失败`);
            results.push({ status: "fulfilled", value: { product, payload } });
          } catch (error) {
            results.push({ status: "rejected", reason: error });
          }
        }
        const loaded = [];
        const errors = [];
        results.forEach((result) => {
          if (result.status === "fulfilled") {
            const { product, payload } = result.value;
            const previousMeta = state.chainMeta[product];
            const keepLastLive = payload.sourceMode === "saved-fallback" && previousMeta && previousMeta.sourceMode === "live";
            if (keepLastLive) {
              loaded.push({ ...payload, sourceMode: "live-cache", readAt: previousMeta.readAt });
            } else {
              state.chain = [...state.chain.filter((row) => row.product !== product), ...(payload.rows || [])];
              state.chainMeta[product] = { sourceMode: payload.sourceMode, readAt: payload.readAt };
              loaded.push(payload);
            }
          } else {
            errors.push(result.reason && result.reason.message ? result.reason.message : String(result.reason));
          }
        });
        if (!loaded.length) throw new Error(errors.join("；") || "读取失败");
        const totalRows = loaded.reduce((total, payload) => total + Number(payload.rowCount || 0), 0);
        const source = loaded[0];
        const sheets = loaded.map((payload) => `${payload.sheet} ${payload.rowCount || 0}行`).join(" | ");
        const liveFallbacks = loaded.filter((payload) => payload.liveError).map((payload) => payload.sheet);
        const fallbackNote = liveFallbacks.length ? ` | live回落: ${liveFallbacks.join("、")}` : "";
        const errorNote = errors.length ? ` | 失败: ${errors.join("；")}` : "";
        $("sourceLine").textContent = `${source.sourceMode || mode} | ${source.source} | ${sheets} | ${source.readAt}${fallbackNote}${errorNote}`;
        setStatus(`${totalRows} 行`, errors.length ? "bad" : "ok");
        render();
      } catch (error) {
        setStatus(String(error.message || error), "bad");
      } finally {
        state.loading = false;
      }
    }

    async function loadPositions() {
      try {
        const payload = await fetchJson("/api/positions");
        state.positions = payload.positions || [];
      } catch (error) {
        state.positions = JSON.parse(localStorage.getItem("aShareOptionPositions") || "[]");
      }
      render();
    }

    async function persistPositions() {
      localStorage.setItem("aShareOptionPositions", JSON.stringify(state.positions));
      await fetchJson("/api/positions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ positions: state.positions }),
      });
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, { cache: "no-store", ...(options || {}) });
      const text = await response.text();
      let payload = {};
      try { payload = text ? JSON.parse(text) : {}; }
      catch { throw new Error(text.slice(0, 160) || response.statusText); }
      if (!response.ok) throw new Error(payload.error || response.statusText);
      return payload;
    }

    function resetPolling() {
      if (state.pollTimer) clearInterval(state.pollTimer);
      if (!$("autoRefreshInput").checked) return;
      const seconds = clamp(num($("pollInput").value, 2), 1, 60);
      state.pollTimer = setInterval(loadChains, seconds * 1000);
    }

    function render() {
      renderSelectors();
      renderProductCards();
      renderOptionMatrix();
      renderPositions();
      renderInventoryNodes();
      updateEditorOptions(true);
    }

    function renderSelectors() {
      const products = availableProducts();
      fillSelect($("productFilter"), products, state.activeProduct);
      fillSelect(fields.product, products, fields.product.value || state.activeProduct);

      const expiries = expiriesForProduct(state.activeProduct);
      fillSelect($("matrixExpiryFilter"), ["", ...expiries], $("matrixExpiryFilter").value, (v) => v || "全部");
    }

    function renderProductCards() {
      const products = ["创业", "科创"];
      $("productGrid").innerHTML = products.map((product) => {
        const rows = rowsForProduct(product);
        const totals = aggregateProduct(product);
        const disabled = rows.length === 0;
        return `
          <div class="product-card ${state.activeProduct === product ? "active" : ""} ${disabled ? "disabled" : ""}" data-product="${escapeAttr(product)}">
            <div class="product-title">
              <strong>${escapeHtml(product)}</strong>
              <span>现券价<br><b>${fmt(firstNumber(rows.map((r) => r.underlyingPrice)), 4) || "-"}</b></span>
            </div>
            <div class="mini-metrics">
              <div class="mini-metric"><span>持仓笔数</span><strong>${fmtInt(totals.positionCount)}</strong></div>
              <div class="mini-metric"><span>总张数</span><strong>${fmt(totals.grossContracts, 0)}</strong></div>
              <div class="mini-metric"><span>净张数</span><strong>${fmt(totals.contracts, 0)}</strong></div>
              <div class="mini-metric"><span>可平市值</span><strong>${fmtMoney(totals.premium)}</strong></div>
              <div class="mini-metric"><span>浮盈亏</span><strong class="${totals.pnl >= 0 ? "up" : "down"}">${fmtMoney(totals.pnl)}</strong></div>
              <div class="mini-metric"><span>保证金</span><strong>${fmtMoney(totals.shortMargin)}</strong></div>
              <div class="mini-metric"><span>Delta</span><strong>${fmt(totals.delta, 0)}</strong></div>
              <div class="mini-metric"><span>Gamma</span><strong>${fmt(totals.gamma, 0)}</strong></div>
              <div class="mini-metric"><span>Theta</span><strong>${fmt(totals.theta, 0)}</strong></div>
            </div>
          </div>`;
      }).join("");
      document.querySelectorAll(".product-card").forEach((card) => {
        card.addEventListener("click", () => {
          if (!card.classList.contains("disabled")) setActiveProduct(card.dataset.product);
        });
      });
    }

    function setActiveProduct(product) {
      state.activeProduct = product || "创业";
      $("productFilter").value = state.activeProduct;
      $("matrixExpiryFilter").value = "";
      fields.product.value = state.activeProduct;
      if (!rowsForProduct(state.activeProduct).length) loadChains();
      render();
    }

    function renderOptionMatrix() {
      const product = state.activeProduct;
      const expiryFilter = $("matrixExpiryFilter").value;
      const search = $("searchInput").value.trim().toLowerCase();
      const rows = rowsForProduct(product).filter((row) => {
        if (expiryFilter && row.expiry !== expiryFilter) return false;
        if (!search) return true;
        return [row.code, row.strikeLabel, row.expiry, row.optionType].join(" ").toLowerCase().includes(search);
      });
      const expiries = [...new Set(rows.map((row) => row.expiry).filter(Boolean))]
        .sort((a, b) => num(a, 999999) - num(b, 999999) || String(a).localeCompare(String(b), "zh-Hans-CN"));
      if (!rows.length) {
        $("optionMatrix").innerHTML = `<div class="empty-state">暂无期权链数据</div>`;
        return;
      }
      $("optionMatrix").innerHTML = expiries.map((expiry) => renderExpiryBlock(product, expiry, rows.filter((row) => row.expiry === expiry))).join("");
      document.querySelectorAll("[data-stage]").forEach((cell) => {
        cell.addEventListener("click", (event) => {
          const action = event.target.closest("[data-qty]");
          const row = rowByKey(cell.dataset.stage);
          if (!row) return;
          stageFromRow(row, action ? Number(action.dataset.qty) : 1);
          if (action) saveDraft();
        });
      });
    }

    function renderExpiryBlock(product, expiry, rows) {
      const columns = matrixColumns();
      const strikes = [...new Set(rows.map((row) => row.strikeLabel).filter(Boolean))]
        .sort((a, b) => num(a, 0) - num(b, 0));
      const calls = new Map(rows.filter((row) => row.optionType === "认购").map((row) => [row.strikeLabel, row]));
      const puts = new Map(rows.filter((row) => row.optionType === "认沽").map((row) => [row.strikeLabel, row]));
      const underlying = firstNumber(rows.map((row) => row.underlyingPrice));
      let markerInserted = false;
      const bodyRows = [];
      strikes.forEach((strike) => {
        const strikeNum = num(strike, null);
        if (!markerInserted && underlying != null && strikeNum != null && strikeNum >= underlying) {
          bodyRows.push(renderUnderlyingRow(underlying, columns.length));
          markerInserted = true;
        }
        bodyRows.push(`
          <tr>
            ${renderOptionCells(calls.get(strike), "call", columns)}
            <td class="strike-cell">${escapeHtml(strike)}</td>
            ${renderOptionCells(puts.get(strike), "put", columns)}
          </tr>`);
      });
      if (!markerInserted && underlying != null) bodyRows.push(renderUnderlyingRow(underlying, columns.length));
      return `
        <div class="expiry-block">
          <table class="chain-table">
            <thead>
              <tr class="chain-group-row">
                <th class="call-head" colspan="${columns.length}">${escapeHtml(expiry)}DTE 认购</th>
                <th class="strike-head" rowspan="2">行权价</th>
                <th class="put-head" colspan="${columns.length}">${escapeHtml(expiry)}DTE 认沽</th>
              </tr>
              <tr>${columns.map((column) => `<th>${escapeHtml(column.label)}</th>`).join("")}${columns.map((column) => `<th>${escapeHtml(column.label)}</th>`).join("")}</tr>
            </thead>
            <tbody>${bodyRows.join("")}</tbody>
          </table>
        </div>`;
    }

    function renderUnderlyingRow(underlying, columnCount) {
      return `
        <tr class="underlying-row">
          <td colspan="${columnCount}"></td>
          <td class="strike-cell"><span class="underlying-marker">当前现券价<br>${fmt(underlying, 4)}</span></td>
          <td colspan="${columnCount}"></td>
        </tr>`;
    }

    function matrixColumns() {
      const view = $("matrixView").value;
      if (view === "greeks") return [
        { key: "bid", label: "Bid" }, { key: "ask", label: "Ask" }, { key: "delta", label: "Delta" },
        { key: "gamma", label: "Gamma" }, { key: "vega", label: "Vega" }, { key: "theta", label: "Theta" },
        { key: "iv", label: "IV" }, { key: "miv", label: "MIV" },
      ];
      if (view === "liquidity") return [
        { key: "bid", label: "Bid" }, { key: "mid", label: "Mid" }, { key: "ask", label: "Ask" },
        { key: "volume", label: "成交量" }, { key: "openInterest", label: "持仓量" }, { key: "margin", label: "保证金" },
        { key: "iv", label: "IV" }, { key: "delta", label: "Delta" },
      ];
      return [
        { key: "last", label: "最新价" }, { key: "bid", label: "Bid" }, { key: "ask", label: "Ask" },
        { key: "change", label: "涨跌" }, { key: "changePct", label: "涨跌幅" }, { key: "volume", label: "成交量" },
        { key: "openInterest", label: "持仓量" }, { key: "iv", label: "IV" }, { key: "delta", label: "Delta" },
      ];
    }

    function renderOptionCells(row, side, columns) {
      if (!row) return columns.map(() => `<td class="empty-data">-</td>`).join("");
      const positionQty = sum(state.positions.filter((pos) => pos.code === row.code).map((pos) => pos.quantity));
      const sideClass = side === "call" ? "call-data" : "put-data";
      return columns.map((column) => {
        const baseClass = `option-data ${sideClass} ${positionQty ? "has-position" : ""}`;
        const value = matrixValue(row, column.key);
        return `<td class="${baseClass}" data-stage="${escapeAttr(row.rowKey)}"><span class="${value.className}">${escapeHtml(value.text)}</span></td>`;
      }).join("");
    }

    function matrixValue(row, key) {
      const changeClass = num(row.changePct, 0) >= 0 ? "up" : "down";
      const values = {
        last: fmt(row.mark ?? row.last, 4),
        bid: fmt(row.bid, 4),
        mid: fmt(row.mark ?? row.mid, 4),
        ask: fmt(row.ask, 4),
        change: fmt(row.change, 4),
        changePct: fmtPctRaw(row.changePct),
        volume: fmtCompact(row.volume),
        openInterest: fmtCompact(row.openInterest),
        iv: fmtPct(row.iv),
        miv: fmtPct(row.miv),
        delta: fmt(row.delta, 4),
        gamma: fmt(row.gamma, 4),
        vega: fmt(row.vega, 4),
        theta: fmt(row.theta, 4),
        margin: fmtCompact(row.margin),
      };
      return { text: values[key] || "-", className: key === "change" || key === "changePct" ? changeClass : "" };
    }

    function updateEditorOptions(keepCurrent = false) {
      if (state.editorSyncing) return;
      state.editorSyncing = true;
      const product = fields.product.value || state.activeProduct;
      const type = fields.type.value || "认购";
      const oldExpiry = fields.expiry.value;
      const oldStrike = fields.strike.value;
      const expiries = expiriesForProduct(product, type);
      fillSelect(fields.expiry, expiries, keepCurrent ? oldExpiry : (oldExpiry || expiries[0]));
      const expiry = fields.expiry.value || expiries[0] || "";
      const strikes = strikesFor(product, type, expiry);
      fillSelect(fields.strike, strikes, keepCurrent ? oldStrike : (oldStrike || strikes[0]));
      syncEditorContract();
      state.editorSyncing = false;
    }

    function syncEditorContract() {
      const row = rowForEditor();
      if (!row) {
        fields.code.value = "";
        $("draftHint").textContent = "未匹配合约";
        return;
      }
      fields.code.value = row.code;
      if (!fields.open.value) fields.open.value = fmtRaw(row.mark ?? row.mid ?? row.last);
      $("draftHint").textContent = `${row.code} | ${row.optionType} ${row.expiry}DTE ${row.strikeLabel}`;
      state.selectedKey = row.rowKey;
    }

    function stageFromRow(row, signedQty) {
      fields.id.value = "";
      fields.product.value = row.product || state.activeProduct;
      fields.type.value = row.optionType || "认购";
      fields.expiry.value = row.expiry || "";
      updateEditorOptions(true);
      fields.strike.value = row.strikeLabel || "";
      fields.qty.value = signedQty || 1;
      fields.open.value = fmtRaw(row.mark ?? row.mid ?? row.last);
      fields.code.value = row.code || "";
      fields.note.value = "";
      state.selectedKey = row.rowKey;
      $("draftHint").textContent = `${row.code} | ${row.optionType} ${row.expiry}DTE ${row.strikeLabel}`;
      renderOptionMatrix();
    }

    async function saveDraft() {
      syncEditorContract();
      const row = rowForEditor();
      if (!row) {
        setStatus("合约未匹配，不能保存", "bad");
        return;
      }
      const item = {
        id: fields.id.value || `pos_${Date.now()}_${Math.random().toString(16).slice(2)}`,
        product: fields.product.value,
        optionType: fields.type.value,
        quantity: num(fields.qty.value, 0),
        strike: fields.strike.value,
        openPrice: num(fields.open.value, row.mark || 0),
        expiry: fields.expiry.value,
        code: row.code,
        note: fields.note.value.trim(),
        updatedAt: new Date().toISOString(),
      };
      if (!item.quantity) return;
      const index = state.positions.findIndex((position) => position.id === item.id);
      if (index >= 0) state.positions.splice(index, 1, item);
      else state.positions.push(item);
      await persistPositions();
      clearDraft(false);
      render();
      setStatus("持仓已保存", "ok");
    }

    function clearDraft(rerender = true) {
      fields.id.value = "";
      fields.product.value = state.activeProduct;
      fields.type.value = "认购";
      fields.qty.value = "1";
      fields.open.value = "";
      fields.code.value = "";
      fields.note.value = "";
      state.selectedKey = "";
      updateEditorOptions(false);
      $("draftHint").textContent = "联动选择合约";
      if (rerender) render();
    }

    function editPosition(id) {
      const item = state.positions.find((position) => position.id === id);
      if (!item) return;
      fields.id.value = item.id || "";
      fields.product.value = item.product || state.activeProduct;
      fields.type.value = item.optionType || "认购";
      fields.expiry.value = item.expiry || "";
      updateEditorOptions(true);
      fields.strike.value = item.strike || "";
      fields.qty.value = item.quantity ?? 1;
      fields.open.value = item.openPrice ?? "";
      fields.code.value = item.code || "";
      fields.note.value = item.note || "";
      syncEditorContract();
    }

    async function deletePosition(id) {
      const previous = state.positions;
      const removed = previous.find((position) => position.id === id);
      if (!removed) return;
      state.positions = previous.filter((position) => position.id !== id);
      render();
      if (fields.id.value === id) clearDraft(false);
      try {
        await persistPositions();
        setStatus("持仓已删除", "ok");
      } catch (error) {
        setStatus(`已本地删除，保存失败: ${String(error.message || error)}`, "bad");
      }
    }

    function renderPositions() {
      const enriched = state.positions.map(enrichPosition);
      $("positionCount").textContent = `${state.positions.length} 笔`;
      $("positionsBody").innerHTML = enriched.map((item) => `
        <tr>
          <td class="left">${escapeHtml(item.product || "")}</td>
          <td>${escapeHtml(item.expiry || "")}DTE</td>
          <td class="${item.optionType === "认购" ? "side-call" : "side-put"}">${item.optionType === "认购" ? "购" : "沽"}</td>
          <td class="${num(item.quantity, 0) >= 0 ? "up" : "down"}">${fmt(item.quantity, 0)}</td>
          <td>${escapeHtml(item.strike || "")}</td>
          <td>${fmt(item.openPrice, 4)}</td>
          <td>${fmt(item.bid, 4) || "-"}</td>
          <td>${fmt(item.ask, 4) || "-"}</td>
          <td class="${item.pnl >= 0 ? "up" : "down"}">${fmtMoney(item.pnl)}</td>
          <td class="position-actions"><div><button data-edit="${escapeAttr(item.id)}">编辑</button><button class="danger" data-delete="${escapeAttr(item.id)}">删除</button></div></td>
        </tr>
      `).join("") || `<tr><td colspan="10" class="empty-state">暂无持仓</td></tr>`;
      document.querySelectorAll("[data-edit]").forEach((button) => button.addEventListener("click", () => editPosition(button.dataset.edit)));
      document.querySelectorAll("[data-delete]").forEach((button) => button.addEventListener("click", () => deletePosition(button.dataset.delete)));
    }

    function renderInventoryNodes() {
      const product = state.activeProduct;
      const expiry = $("matrixExpiryFilter").value || expiriesForProduct(product)[0] || "";
      const rows = rowsForProduct(product).filter((row) => !expiry || row.expiry === expiry);
      const strikes = [...new Set(rows.map((row) => row.strikeLabel).filter(Boolean))].sort((a, b) => num(a, 0) - num(b, 0));
      const underlying = firstNumber(rows.map((row) => row.underlyingPrice));
      $("inventoryHint").textContent = `${product}${expiry ? ` | ${expiry}DTE` : ""}`;
      if (!strikes.length) {
        $("inventoryNodes").innerHTML = `<div class="empty-state">暂无行权节点</div>`;
        return;
      }
      let markerInserted = false;
      const html = [];
      strikes.forEach((strike) => {
        const strikeNum = num(strike, null);
        if (!markerInserted && underlying != null && strikeNum != null && strikeNum >= underlying) {
          html.push(`<div class="node-row underlying"><div class="node-cell empty"></div><div class="node-strike">当前现券价<br>${fmt(underlying, 4)}</div><div class="node-cell empty"></div></div>`);
          markerInserted = true;
        }
        html.push(`<div class="node-row">${renderNodeCell(product, "认购", expiry, strike)}<div class="node-strike">${escapeHtml(strike)}</div>${renderNodeCell(product, "认沽", expiry, strike)}</div>`);
      });
      if (!markerInserted && underlying != null) {
        html.push(`<div class="node-row underlying"><div class="node-cell empty"></div><div class="node-strike">当前现券价<br>${fmt(underlying, 4)}</div><div class="node-cell empty"></div></div>`);
      }
      $("inventoryNodes").innerHTML = `<div class="inventory-note">当前品种 ${escapeHtml(product)}，绿色行为当前现券价位置。</div><div class="node-grid">${html.join("")}</div>`;
    }

    function renderNodeCell(product, type, expiry, strike) {
      const positions = state.positions.filter((pos) => pos.product === product && pos.optionType === type && pos.expiry === expiry && String(pos.strike) === String(strike));
      if (!positions.length) return `<div class="node-cell empty">-</div>`;
      const text = positions.map((pos) => {
        const row = matchChainRow(pos);
        return `<b>${fmt(pos.quantity, 0)}张 ${type === "认购" ? "购" : "沽"} ${strike}</b><br><span class="muted">Delta ${fmt(row && row.delta, 4)} · Bid/Ask ${fmt(row && row.bid, 4)} / ${fmt(row && row.ask, 4)}</span>`;
      }).join("<br>");
      return `<div class="node-cell active">${text}</div>`;
    }

    function rowForEditor() {
      return state.chain.find((row) =>
        row.product === fields.product.value &&
        row.optionType === fields.type.value &&
        row.expiry === fields.expiry.value &&
        String(row.strikeLabel) === String(fields.strike.value)
      );
    }

    function rowsForProduct(product) {
      return state.chain.filter((row) => row.product === product);
    }

    function availableProducts() {
      const products = [...new Set(state.chain.map((row) => row.product).filter(Boolean))];
      return [...new Set(["创业", "科创", ...products])];
    }

    function expiriesForProduct(product, type = "") {
      return [...new Set(rowsForProduct(product)
        .filter((row) => !type || row.optionType === type)
        .map((row) => row.expiry)
        .filter(Boolean))]
        .sort((a, b) => num(a, 999999) - num(b, 999999) || String(a).localeCompare(String(b), "zh-Hans-CN"));
    }

    function strikesFor(product, type, expiry) {
      return [...new Set(rowsForProduct(product)
        .filter((row) => row.optionType === type && row.expiry === expiry)
        .map((row) => row.strikeLabel)
        .filter(Boolean))]
        .sort((a, b) => num(a, 0) - num(b, 0));
    }

    function productFromSheet(sheet) {
      return String(sheet || "").includes("科创") ? "科创" : "创业";
    }

    function matchChainRow(position) {
      if (position.code) {
        const byCode = state.chain.find((row) => row.code === position.code);
        if (byCode) return byCode;
      }
      return state.chain.find((row) =>
        row.product === position.product &&
        row.optionType === position.optionType &&
        row.expiry === position.expiry &&
        String(row.strikeLabel) === String(position.strike)
      );
    }

    function rowByKey(key) {
      return state.chain.find((row) => row.rowKey === key);
    }

    function enrichPosition(position) {
      const row = matchChainRow(position);
      const multiplier = clamp(num($("multiplierInput").value, 10000), 1, 100000000);
      const quantity = num(position.quantity, 0);
      const fallbackPrice = row ? num(row.mark ?? row.mid ?? row.last, position.openPrice) : num(position.openPrice, 0);
      const bid = row ? num(row.bid, null) : null;
      const ask = row ? num(row.ask, null) : null;
      const exitPrice = quantity < 0 ? (ask ?? fallbackPrice) : (bid ?? fallbackPrice);
      const openPrice = num(position.openPrice, exitPrice);
      return {
        ...position,
        mark: exitPrice,
        bid,
        ask,
        exitPrice,
        openPrice,
        marketValue: quantity * exitPrice * multiplier,
        pnl: quantity * (exitPrice - openPrice) * multiplier,
        shortMargin: quantity < 0 ? Math.abs(quantity) * num(row && row.margin, 0) : 0,
        deltaExposure: quantity * num(row && row.delta, 0) * multiplier,
        gammaExposure: quantity * num(row && row.gamma, 0) * multiplier,
        vegaExposure: quantity * num(row && row.vega, 0) * multiplier,
        thetaExposure: quantity * num(row && row.theta, 0) * multiplier,
      };
    }

    function aggregateProduct(product) {
      return state.positions.filter((position) => position.product === product).map(enrichPosition).reduce((acc, item) => {
        acc.positionCount += 1;
        acc.grossContracts += Math.abs(num(item.quantity, 0));
        acc.contracts += num(item.quantity, 0);
        acc.premium += item.marketValue || 0;
        acc.pnl += item.pnl || 0;
        acc.shortMargin += item.shortMargin || 0;
        acc.delta += item.deltaExposure || 0;
        acc.gamma += item.gammaExposure || 0;
        acc.theta += item.thetaExposure || 0;
        return acc;
      }, { positionCount: 0, grossContracts: 0, contracts: 0, premium: 0, pnl: 0, shortMargin: 0, delta: 0, gamma: 0, theta: 0 });
    }

    function positionPnl(code) {
      return sum(state.positions.filter((pos) => pos.code === code).map((pos) => enrichPosition(pos).pnl));
    }

    function exportPositions() {
      const blob = new Blob([JSON.stringify(state.positions, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `a_share_option_positions_${new Date().toISOString().slice(0, 10)}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function fillSelect(select, values, selected, labeler = (v) => v) {
      const value = selected != null ? String(selected) : "";
      select.innerHTML = values.map((item) => `<option value="${escapeAttr(item)}">${escapeHtml(labeler(item))}</option>`).join("");
      if (values.map(String).includes(value)) select.value = value;
      else if (values.length) select.value = String(values[0]);
    }

    function setStatus(text, kind) {
      $("statusText").textContent = text;
      $("statusDot").className = `dot ${kind || ""}`;
    }

    function num(value, fallback = null) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }
    function sum(values) { return values.reduce((acc, value) => acc + num(value, 0), 0); }
    function firstNumber(values) { return values.find((value) => Number.isFinite(Number(value))) ?? null; }
    function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
    function fmt(value, digits = 2) {
      if (!Number.isFinite(Number(value))) return "";
      return Number(value).toLocaleString("zh-CN", { maximumFractionDigits: digits, minimumFractionDigits: 0 });
    }
    function fmtRaw(value) {
      if (!Number.isFinite(Number(value))) return "";
      return String(Math.round(Number(value) * 10000) / 10000);
    }
    function fmtInt(value) {
      if (!Number.isFinite(Number(value))) return "";
      return Math.round(Number(value)).toLocaleString("zh-CN");
    }
    function fmtCompact(value) {
      if (!Number.isFinite(Number(value))) return "";
      const number = Number(value);
      if (Math.abs(number) >= 10000) return `${(number / 10000).toFixed(Math.abs(number) >= 100000 ? 0 : 1).replace(/\.0$/, "")}万`;
      return fmtInt(number);
    }
    function fmtMoney(value) {
      if (!Number.isFinite(Number(value))) return "";
      return Number(value).toLocaleString("zh-CN", { maximumFractionDigits: 0, minimumFractionDigits: 0 });
    }
    function fmtPct(value) {
      if (!Number.isFinite(Number(value))) return "";
      return `${(Number(value) * 100).toFixed(1)}%`;
    }
    function fmtPctRaw(value) {
      if (!Number.isFinite(Number(value))) return "";
      return `${Number(value).toFixed(1)}%`;
    }
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
    function escapeAttr(value) { return escapeHtml(value); }
  </script>
</body>
</html>
