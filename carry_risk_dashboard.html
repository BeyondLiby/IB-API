<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>卖权 Carry 驾驶舱</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #15202b;
      --muted: #667085;
      --line: #d8dee8;
      --soft: #eef2f6;
      --blue: #175cd3;
      --green: #067647;
      --amber: #b54708;
      --red: #b42318;
      --purple: #6941c6;
      --cyan: #0e7090;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.07);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 700;
    }

    h2 {
      margin: 20px 0 10px;
      font-size: 16px;
      font-weight: 700;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #344054;
      font-weight: 700;
    }

    button, input, textarea {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
    }

    button {
      height: 36px;
      padding: 0 12px;
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      cursor: pointer;
      white-space: nowrap;
    }

    button.secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    input {
      height: 36px;
      padding: 0 9px;
      min-width: 0;
    }

    input[type="file"] {
      padding: 7px 9px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      padding: 10px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      line-height: 1.4;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }

    main {
      max-width: 1840px;
      margin: 0 auto;
      padding: 16px 18px 34px;
    }

    .top-controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr)) auto;
      gap: 9px;
      align-items: end;
    }

    .product-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .product-tab {
      height: 32px;
      min-width: 64px;
      padding: 0 14px;
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
      font-weight: 700;
    }

    .product-tab.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 9px;
      align-items: end;
    }

    .paste-panel {
      display: none;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 12px;
    }

    .paste-panel.open { display: grid; }

    .error {
      min-height: 18px;
      color: var(--red);
      margin-top: 7px;
      font-size: 13px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 14px;
      align-items: stretch;
    }

    .decision-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
      min-height: 92px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 5px;
      height: 100%;
      background: var(--blue);
    }

    .card.green::before { background: var(--green); }
    .card.amber::before { background: var(--amber); }
    .card.red::before { background: var(--red); }
    .card.purple::before { background: var(--purple); }
    .card.cyan::before { background: var(--cyan); }

    .card .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 24px;
      line-height: 1.15;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .card .sub {
      color: var(--muted);
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.35;
    }

    .green .value { color: var(--green); }
    .amber .value { color: var(--amber); }
    .red .value { color: var(--red); }
    .purple .value { color: var(--purple); }
    .cyan .value { color: var(--cyan); }

    .summary {
      background: #101828;
      color: #f9fafb;
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      min-height: 100%;
      line-height: 1.68;
      white-space: pre-line;
      border: 1px solid #101828;
    }

    .summary .muted {
      color: #d0d5dd;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .fixed-target {
      display: grid;
      grid-template-columns: repeat(3, minmax(140px, 1fr));
      gap: 10px;
    }

    .fixed-target .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #f8fafc;
    }

    .fixed-target .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .fixed-target .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.15;
    }

    .chart-panel {
      min-height: 360px;
    }

    .data-status-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 10px;
    }

    .status-pill {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      padding: 10px 12px;
      min-height: 72px;
    }

    .status-pill strong {
      display: block;
      font-size: 20px;
      line-height: 1.2;
      margin-bottom: 5px;
    }

    .status-pill span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .status-pill.ready strong { color: var(--green); }
    .status-pill.missing strong { color: var(--red); }
    .status-pill.partial strong { color: var(--amber); }

    .chart-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .chart-caption {
      color: var(--muted);
      font-size: 12px;
    }

    .kline-chart {
      width: 100%;
      height: 310px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(#fff, #fbfcfe);
      overflow: hidden;
    }

    .kline-chart svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .option-chain-cross {
      max-height: 640px;
    }

    .option-chain-cross table {
      min-width: 1320px;
      font-size: 12px;
    }

    .option-chain-cross th.call,
    .option-chain-cross td.call {
      background: #f0fdf4;
    }

    .option-chain-cross th.put,
    .option-chain-cross td.put {
      background: #fff7ed;
    }

    .option-chain-cross th.strike,
    .option-chain-cross td.strike {
      text-align: center;
      background: #1f2937;
      color: #fff;
      font-weight: 800;
      position: sticky;
      left: 0;
      z-index: 2;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      max-height: 520px;
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 9px;
      text-align: right;
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--soft);
      color: #344054;
      font-weight: 700;
    }

    td:first-child, th:first-child, td.text, th.text { text-align: left; }
    tr:hover td { background: #f8fafc; }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .危急 { color: #fff; background: var(--red); }
    .危险 { color: #7a271a; background: #fee4e2; border-color: #fecdca; }
    .警惕 { color: #7a4b00; background: #fef0c7; border-color: #fedf89; }
    .正常 { color: #184e77; background: #dbeafe; border-color: #bfdbfe; }
    .安全 { color: #05603a; background: #d1fadf; border-color: #a6f4c5; }
    .排除 { color: #344054; background: #eef2f6; border-color: #d0d5dd; }

    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .muted { color: var(--muted); }

    .bar {
      height: 8px;
      background: #eef2f6;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--blue);
    }

    .bar.red span { background: var(--red); }
    .bar.amber span { background: var(--amber); }
    .bar.green span { background: var(--green); }

    @media (max-width: 1280px) {
      .top-controls, .controls { grid-template-columns: 1fr 1fr; }
      .hero, .layout { grid-template-columns: 1fr; }
      .decision-grid { grid-template-columns: repeat(2, minmax(150px, 1fr)); }
      .data-status-grid { grid-template-columns: repeat(2, minmax(150px, 1fr)); }
    }

    @media (max-width: 760px) {
      header, main { padding-left: 12px; padding-right: 12px; }
      .top-controls, .controls { grid-template-columns: 1fr; }
      .paste-panel { grid-template-columns: 1fr; }
      .decision-grid { grid-template-columns: 1fr; }
      .data-status-grid { grid-template-columns: 1fr; }
      .card .value { font-size: 21px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>卖权 Carry 驾驶舱</h1>
    <div class="top-controls">
      <label>当前持仓 CSV/JSON<input id="positionFile" type="file" accept=".csv,.json,.txt" /></label>
      <label>期权链 CSV/JSON<input id="chainFile" type="file" accept=".csv,.json,.txt" /></label>
      <label>期货K线 CSV/JSON<input id="barsFile" type="file" accept=".csv,.json,.txt" /></label>
      <button id="sampleBtn" class="secondary">加载样例</button>
    </div>
    <div id="productTabs" class="product-tabs"></div>
    <div id="error" class="error"></div>
  </header>

  <main>
    <div class="layout">
      <div class="panel">
        <h3>收益目标设置</h3>
        <div class="fixed-target">
          <div class="metric"><span>月目标回报</span><strong>10%</strong></div>
          <div class="metric"><span>资金基数</span><strong>$20,000</strong></div>
          <div class="metric"><span>月目标收益</span><strong>$2,000</strong></div>
        </div>
      </div>
      <div class="panel">
        <h3>筛选参数</h3>
        <div class="controls">
          <label>候选Delta上限<input id="candidateDeltaMax" type="number" value="0.40" step="0.01" min="0" /></label>
          <label>期权链到期<input id="expiryFilter" type="text" value="" placeholder="自动选择最近到期" /></label>
        </div>
      </div>
      <div class="panel">
        <h3>事件定价参数</h3>
        <div class="controls">
          <label>期货价格<input id="futuresPrice" type="number" value="107" step="0.01" /></label>
          <label>1点=bp<input id="bpPerPoint" type="number" value="16" step="0.1" /></label>
          <label>ATM IV %<input id="atmIv" type="number" value="5" step="0.1" min="0" /></label>
          <label>ATM跨式价格<input id="atmStraddle" type="number" value="" step="0.001" min="0" placeholder="可空" /></label>
          <label>事件天数<input id="eventDays" type="number" value="1" step="1" min="0.25" /></label>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top: 14px;">
      <div style="display:flex; gap:8px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
        <h3 style="margin:0;">粘贴数据</h3>
        <div style="display:flex; gap:8px;">
          <button id="pasteToggle" class="secondary">展开/收起</button>
          <button id="clearBtn" class="secondary">清空</button>
        </div>
      </div>
      <div id="pastePanel" class="paste-panel" style="margin-top:12px;">
        <label>粘贴当前持仓<textarea id="positionPaste" placeholder="粘贴当前持仓 CSV 或 JSON"></textarea></label>
        <label>粘贴期权链<textarea id="chainPaste" placeholder="粘贴期权链 CSV 或 JSON"></textarea></label>
        <label>粘贴期货K线<textarea id="barsPaste" placeholder="粘贴 K线 CSV 或 JSON，字段 symbol,date,open,high,low,close,volume"></textarea></label>
        <button id="loadPaste">加载粘贴数据</button>
      </div>
    </div>

    <h2>数据覆盖</h2>
    <div class="panel">
      <div id="dataStatus" class="data-status-grid"></div>
    </div>

    <h2>期货走势</h2>
    <div class="panel chart-panel">
      <div class="chart-toolbar">
        <h3 style="margin:0;">30分钟K线，近一个月</h3>
        <div id="klineCaption" class="chart-caption"></div>
      </div>
      <div id="klineChart" class="kline-chart"></div>
    </div>

    <section class="hero">
      <div id="decisionCards" class="decision-grid"></div>
      <div id="summary" class="summary"><span class="muted">请导入当前持仓，或加载样例。</span></div>
    </section>

    <h2>收益地图</h2>
    <div class="layout">
      <div class="panel">
        <h3>按到期时间分布</h3>
        <div id="incomeDte" class="table-wrap"></div>
      </div>
      <div class="panel">
        <h3>按Delta分布</h3>
        <div id="incomeDelta" class="table-wrap"></div>
      </div>
    </div>

    <h2>目标缺口与补卖矩阵</h2>
    <div class="panel">
      <div id="sellMatrixNote" class="chart-caption" style="margin-bottom:8px;"></div>
      <div id="sellMatrix" class="table-wrap"></div>
    </div>

    <h2>最新期权链</h2>
    <div class="panel">
      <div class="chart-toolbar">
        <h3 id="chainBoardTitle" style="margin:0;">标准链表</h3>
        <div id="chainBoardCaption" class="chart-caption"></div>
      </div>
      <div id="optionChainBoard" class="table-wrap option-chain-cross"></div>
    </div>

    <h2>风险地图</h2>
    <div class="layout">
      <div class="panel">
        <h3>希腊字母按到期分布</h3>
        <div id="riskDte" class="table-wrap"></div>
      </div>
      <div class="panel">
        <h3>期货价格变动压力测试</h3>
        <div id="shockTable" class="table-wrap"></div>
      </div>
    </div>

    <h2>事件定价</h2>
    <div class="layout">
      <div class="panel">
        <h3>周内隐含波动分布</h3>
        <div id="eventTable" class="table-wrap"></div>
      </div>
      <div class="panel">
        <h3>当前最危险仓位</h3>
        <div id="dangerTable" class="table-wrap"></div>
      </div>
    </div>

    <h2>操作候选</h2>
    <div class="panel">
      <div id="actionTable" class="table-wrap"></div>
    </div>

    <h2>持仓明细</h2>
    <div class="layout">
      <div class="panel">
        <h3>Carry View：只看卖出期权</h3>
        <div id="carryTable" class="table-wrap"></div>
      </div>
      <div class="panel">
        <h3>Account View：全部期权持仓</h3>
        <div id="accountTable" class="table-wrap"></div>
      </div>
    </div>
  </main>

  <script>
    const DTE_BUCKETS = ["0DTE", "1DTE", "2DTE", "3-7DTE", "8-21DTE", "22DTE+"];
    const DELTA_BUCKETS = ["<0.10", "0.10-0.25", "0.25-0.40", ">=0.40"];
    const SHOCK_MOVES = [-0.50, -0.40, -0.30, -0.20, -0.10, 0.10, 0.20, 0.30, 0.40, 0.50];
    const DEFAULT_POSITION_PATH = "data/carry_dashboard_positions.csv";
    const DEFAULT_CHAIN_PATH = "data/carry_dashboard_chain.csv";
    const DEFAULT_BARS_PATH = "data/carry_dashboard_bars.csv";
    const FIXED_TARGET_RETURN = 10;
    const FIXED_CAPITAL_BASE = 20000;
    const FIXED_TARGET_PREMIUM = FIXED_CAPITAL_BASE * FIXED_TARGET_RETURN / 100;
    const MIN_CHAIN_ROWS = 50;
    const MIN_BARS_ROWS = 100;
    const MAX_CHAIN_AGE_HOURS = 24;
    const MAX_BARS_AGE_HOURS = 72;
    let positionRows = [];
    let chainRows = [];
    let barsRows = [];
    let selectedProduct = "";

    const $ = id => document.getElementById(id);
    const controls = ["futuresPrice", "bpPerPoint", "atmIv", "atmStraddle", "eventDays", "candidateDeltaMax", "expiryFilter"];
    controls.forEach(id => $(id).addEventListener("input", render));
    $("sampleBtn").addEventListener("click", () => { positionRows = samplePositions(); chainRows = sampleChain(); barsRows = sampleBars(); selectedProduct = "ZF"; render(); });
    $("clearBtn").addEventListener("click", () => { positionRows = []; chainRows = []; barsRows = []; selectedProduct = ""; $("positionPaste").value = ""; $("chainPaste").value = ""; $("barsPaste").value = ""; render(); });
    $("pasteToggle").addEventListener("click", () => $("pastePanel").classList.toggle("open"));
    $("loadPaste").addEventListener("click", () => {
      if ($("positionPaste").value.trim()) positionRows = parseInput($("positionPaste").value);
      if ($("chainPaste").value.trim()) chainRows = parseInput($("chainPaste").value);
      if ($("barsPaste").value.trim()) barsRows = parseInput($("barsPaste").value);
      render();
    });
    $("positionFile").addEventListener("change", event => loadFile(event, rows => { positionRows = rows; render(); }));
    $("chainFile").addEventListener("change", event => loadFile(event, rows => { chainRows = rows; render(); }));
    $("barsFile").addEventListener("change", event => loadFile(event, rows => { barsRows = rows; render(); }));

    async function loadFile(event, callback) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        callback(parseInput(await file.text()));
        setError("");
      } catch (error) {
        setError(error.message || String(error));
      }
    }

    async function loadDefaultData() {
      const [positions, chain, bars] = await Promise.allSettled([
        fetchRows(DEFAULT_POSITION_PATH),
        fetchRows(DEFAULT_CHAIN_PATH),
        fetchRows(DEFAULT_BARS_PATH)
      ]);
      let loaded = 0;
      const failures = [];
      if (positions.status === "fulfilled") {
        positionRows = positions.value;
        loaded += 1;
      } else {
        failures.push("当前持仓");
      }
      if (chain.status === "fulfilled") {
        chainRows = chain.value;
        loaded += 1;
      } else {
        failures.push("期权链");
      }
      if (bars.status === "fulfilled") {
        barsRows = bars.value;
        loaded += 1;
      }
      render();
      if (loaded > 0 && failures.length) {
        setError(`自动载入部分数据失败：${failures.join("、")}。可手动上传补齐。`);
      }
    }

    async function fetchRows(path) {
      const response = await fetch(`${path}?t=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`${path}: ${response.status}`);
      return parseInput(await response.text());
    }

    function parseInput(raw) {
      const text = String(raw || "").trim();
      if (!text) return [];
      if (text.startsWith("[") || text.startsWith("{")) {
        const parsed = JSON.parse(text);
        return Array.isArray(parsed) ? parsed : (Array.isArray(parsed.rows) ? parsed.rows : [parsed]);
      }
      return parseCSV(text);
    }

    function parseCSV(text) {
      const matrix = [];
      let row = [], cell = "", quoted = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (ch === '"' && quoted && next === '"') { cell += '"'; i++; }
        else if (ch === '"') quoted = !quoted;
        else if (ch === "," && !quoted) { row.push(cell); cell = ""; }
        else if ((ch === "\n" || ch === "\r") && !quoted) {
          if (ch === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(v => v.trim() !== "")) matrix.push(row);
          row = []; cell = "";
        } else cell += ch;
      }
      row.push(cell);
      if (row.some(v => v.trim() !== "")) matrix.push(row);
      if (matrix.length < 2) return [];
      const headers = matrix[0].map(h => h.trim());
      return matrix.slice(1).map(values => {
        const out = {};
        headers.forEach((h, i) => out[h] = values[i] ?? "");
        return out;
      });
    }

    function toNum(value) {
      if (value === null || value === undefined) return NaN;
      if (typeof value === "number") return Number.isFinite(value) ? value : NaN;
      const text = String(value).replace(/[$,%]/g, "").replace(/,/g, "").trim();
      if (!text || /^nan$/i.test(text) || /missing/i.test(text)) return NaN;
      const number = Number(text);
      return Number.isFinite(number) ? number : NaN;
    }

    function firstNum(...values) {
      for (const value of values) {
        const number = toNum(value);
        if (Number.isFinite(number)) return number;
      }
      return NaN;
    }

    function txt(value) {
      return value === null || value === undefined ? "" : String(value).trim();
    }

    function dteFromExpiry(expiry) {
      const raw = txt(expiry).slice(0, 8);
      if (!/^\d{8}$/.test(raw)) return NaN;
      const date = new Date(Number(raw.slice(0, 4)), Number(raw.slice(4, 6)) - 1, Number(raw.slice(6, 8)));
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      return Math.round((date - today) / 86400000);
    }

    function dteBucket(dte) {
      if (!Number.isFinite(dte)) return "22DTE+";
      if (dte <= 0) return "0DTE";
      if (dte <= 1) return "1DTE";
      if (dte <= 2) return "2DTE";
      if (dte <= 7) return "3-7DTE";
      if (dte <= 21) return "8-21DTE";
      return "22DTE+";
    }

    function deltaBucket(absDelta) {
      if (!Number.isFinite(absDelta)) return ">=0.40";
      if (absDelta < 0.10) return "<0.10";
      if (absDelta < 0.25) return "0.10-0.25";
      if (absDelta < 0.40) return "0.25-0.40";
      return ">=0.40";
    }

    function productOf(raw) {
      const explicit = txt(raw.product || raw.root || raw.symbol || raw.tradingClass).toUpperCase();
      if (/^(ZF|ZN|ZC|ZT|TN|ZB|UB)$/.test(explicit)) return explicit;
      const candidates = [
        raw.localSymbol,
        raw.optionName,
        raw.contract,
        raw.description,
        raw.name,
        raw.conId
      ].map(value => txt(value).toUpperCase()).filter(Boolean);
      for (const text of candidates) {
        const match = text.match(/\b(ZF|ZN|ZC|ZT|TN|ZB|UB)\b|^(ZF|ZN|ZC|ZT|TN|ZB|UB)[-\s_]|^(ZF|ZN|ZC|ZT|TN|ZB|UB)[FGHJKMNQUVXZ]\d\b/);
        if (match) return match[1] || match[2] || match[3];
        if (/^OZN/.test(text)) return "ZN";
        if (/^OZC/.test(text)) return "ZC";
      }
      return "";
    }

    function productSet() {
      const products = new Set();
      [...positionRows, ...chainRows, ...barsRows].forEach(row => {
        const product = productOf(row);
        if (product) products.add(product);
      });
      return Array.from(products).sort();
    }

    function rowsForProduct(rows, product) {
      if (!product) return rows;
      return rows.filter(row => productOf(row) === product);
    }

    function normalize(rows, mode) {
      const targetMonthlyPremium = targetPremium();
      return rows.map(raw => {
        const direction0 = txt(raw.direction || raw.right).toLowerCase();
        const direction = direction0 === "p" ? "put" : direction0 === "c" ? "call" : direction0;
        const position = mode === "chain" ? 0 : toNum(raw.position);
        const expiry = txt(raw.expiry || raw.expiration || raw.lastTradeDateOrContractMonth);
        const dte = Number.isFinite(toNum(raw.dte)) ? toNum(raw.dte) : dteFromExpiry(expiry);
        const price = firstNum(raw.price, raw.mid, raw.markPrice, raw.modelOptionPrice, raw.optPrice, raw.modelGreeks_optPrice, raw.last, raw.close, raw.bid, raw.ask);
        const multiplier = Number.isFinite(toNum(raw.multiplier)) ? toNum(raw.multiplier) : 1000;
        const premiumPerContract = Number.isFinite(toNum(raw.premiumPerContract)) ? toNum(raw.premiumPerContract) : price * multiplier;
        let signedDelta = firstNum(raw.signedDelta);
        const delta = firstNum(raw.delta, raw.modelGreeks_delta, raw.bidGreeks_delta, raw.askGreeks_delta, raw.lastGreeks_delta);
        if (!Number.isFinite(signedDelta)) {
          signedDelta = Number.isFinite(delta) ? delta : NaN;
          if (direction === "put" && signedDelta > 0) signedDelta *= -1;
        }
        const gamma = firstNum(raw.gamma, raw.modelGreeks_gamma, raw.bidGreeks_gamma, raw.askGreeks_gamma, raw.lastGreeks_gamma);
        const theta = firstNum(raw.theta, raw.modelGreeks_theta, raw.bidGreeks_theta, raw.askGreeks_theta, raw.lastGreeks_theta);
        const marketValue = toNum(raw.marketValue);
        const remainingPremium = position < 0 && Number.isFinite(marketValue) ? -marketValue : 0;
        const absDelta = Math.abs(signedDelta);
        const effective = effectiveCarry(absDelta, remainingPremium);
        const openInterest = direction === "call"
          ? firstNum(raw.openInterest, raw.callOpenInterest, raw.rawOpenInterest)
          : direction === "put"
            ? firstNum(raw.openInterest, raw.putOpenInterest, raw.rawOpenInterest)
            : firstNum(raw.openInterest, raw.rawOpenInterest);
        const volume = direction === "call"
          ? firstNum(raw.volume, raw.callVolume, raw.rawVolume)
          : direction === "put"
            ? firstNum(raw.volume, raw.putVolume, raw.rawVolume)
            : firstNum(raw.volume, raw.rawVolume);
        const iv = firstNum(raw.iv, raw.impliedVolatility, raw.modelGreeks_impliedVol, raw.bidGreeks_impliedVol, raw.askGreeks_impliedVol, raw.lastGreeks_impliedVol);
        const bid = firstNum(raw.bid, raw.bidGreeks_optPrice);
        const ask = firstNum(raw.ask, raw.askGreeks_optPrice);
        const last = firstNum(raw.last, raw.close, raw.markPrice, raw.modelOptionPrice, raw.optPrice, raw.modelGreeks_optPrice, raw.price);
        const out = {
          flag: txt(raw.flag),
          dte,
          product: productOf(raw),
          direction,
          strike: toNum(raw.strike),
          delta: absDelta,
          price,
          bid,
          ask,
          last,
          openInterest,
          volume,
          gamma,
          signedDelta,
          position,
          premiumPerContract,
          currentCarryPremium: Number.isFinite(toNum(raw.currentCarryPremium)) ? toNum(raw.currentCarryPremium) : Math.max(-position, 0) * Math.abs(premiumPerContract),
          targetMonthlyPremium: Number.isFinite(toNum(raw.targetMonthlyPremium)) ? toNum(raw.targetMonthlyPremium) : targetMonthlyPremium,
          contractsForTarget: Number.isFinite(toNum(raw.contractsForTarget)) ? toNum(raw.contractsForTarget) : targetMonthlyPremium / Math.abs(premiumPerContract),
          deltaAtTarget: toNum(raw.deltaAtTarget),
          localSymbol: txt(raw.localSymbol),
          expiry,
          iv,
          theta,
          vega: firstNum(raw.vega, raw.modelGreeks_vega, raw.bidGreeks_vega, raw.askGreeks_vega, raw.lastGreeks_vega),
          marketValue,
          unrealizedPnL: toNum(raw.unrealizedPnL),
          absDelta,
          deltaExposure: position * signedDelta,
          gammaExposure: position * gamma,
          thetaExposure: position * theta,
          remainingPremium,
          isShortOption: position < 0,
          isLongOption: position > 0,
          effectiveCarry: effective,
          riskPremium: Math.max(remainingPremium - effective, 0),
          dteBucket: dteBucket(dte),
          absDeltaBucket: deltaBucket(absDelta)
        };
        if (!Number.isFinite(out.deltaAtTarget)) out.deltaAtTarget = out.contractsForTarget * out.absDelta;
        out.riskLevel = riskLevel(out);
        out.actionCandidate = actionCandidate(out);
        return out;
      }).filter(row => mode === "chain" || Number.isFinite(row.position));
    }

    function effectiveCarry(absDelta, remainingPremium) {
      if (!Number.isFinite(absDelta) || !Number.isFinite(remainingPremium)) return 0;
      if (absDelta < 0.10) return remainingPremium;
      if (absDelta < 0.25) return remainingPremium * 0.75;
      if (absDelta < 0.40) return remainingPremium * 0.35;
      return 0;
    }

    function riskLevel(row) {
      if (!(row.position < 0)) return "买权/排除";
      if (row.dte <= 1 && row.absDelta >= 0.40) return "危急";
      if (row.dte <= 2 && row.absDelta >= 0.30) return "危险";
      if (row.absDelta >= 0.40) return "危险";
      if (row.absDelta >= 0.25) return "警惕";
      if (row.absDelta >= 0.10) return "正常";
      return "安全";
    }

    function actionCandidate(row) {
      if (!(row.position < 0)) return "";
      if (row.dte <= 2 && row.absDelta >= 0.40) return "平仓候选";
      if (row.dte <= 2 && row.absDelta >= 0.25 && row.absDelta < 0.40) return "移仓候选";
      if (row.absDelta < 0.10 && row.remainingPremium > 0) return "低Delta持有";
      if (row.absDelta >= 0.10 && row.absDelta < 0.25 && row.dte >= 2) return "持有候选";
      return "";
    }

    function sum(rows, field) {
      return rows.reduce((acc, row) => acc + (Number.isFinite(row[field]) ? row[field] : 0), 0);
    }

    function metrics(carry) {
      const remaining = sum(carry, "remainingPremium");
      const effective = sum(carry, "effectiveCarry");
      const gammaAbs = carry.reduce((acc, row) => acc + Math.abs(row.gammaExposure || 0), 0);
      const gamma02 = carry.filter(row => row.dte <= 2).reduce((acc, row) => acc + Math.abs(row.gammaExposure || 0), 0);
      return {
        到期最大收益: remaining,
        有效收益: effective,
        目标缺口: Math.max(targetPremium() - effective, 0),
        carryNetDelta: sum(carry, "deltaExposure"),
        carryNetGamma: sum(carry, "gammaExposure"),
        carryNetTheta: sum(carry, "thetaExposure"),
        carryMarketValue: sum(carry, "marketValue"),
        carryUnrealizedPnL: sum(carry, "unrealizedPnL"),
        shortContracts: carry.reduce((acc, row) => acc + Math.abs(row.position || 0), 0),
        riskPremium: remaining - effective,
        carryQualityRatio: remaining ? effective / remaining : NaN,
        gammaShare02: gammaAbs ? gamma02 / gammaAbs : NaN,
        dangerPremium: sum(carry.filter(row => row.absDelta >= 0.40), "remainingPremium")
      };
    }

    function aggregateDte(carry) {
      return DTE_BUCKETS.map(bucket => {
        const rows = carry.filter(row => row.dteBucket === bucket);
        const remaining = sum(rows, "remainingPremium");
        const effective = sum(rows, "effectiveCarry");
        return {
          到期: bucket,
          剩余权利金: remaining,
          有效收益: effective,
          风险权利金: remaining - effective,
          未实现盈亏: sum(rows, "unrealizedPnL"),
          卖出张数: rows.reduce((acc, row) => acc + Math.abs(row.position || 0), 0),
          平均Delta: average(rows, "absDelta"),
          净Delta: sum(rows, "deltaExposure"),
          净Gamma: sum(rows, "gammaExposure"),
          净Theta: sum(rows, "thetaExposure"),
          危险权利金: sum(rows.filter(row => row.absDelta >= 0.40), "remainingPremium")
        };
      });
    }

    function aggregateDelta(carry) {
      return DELTA_BUCKETS.map(bucket => {
        const rows = carry.filter(row => row.absDeltaBucket === bucket);
        return {
          Delta桶: bucket,
          卖出张数: rows.reduce((acc, row) => acc + Math.abs(row.position || 0), 0),
          剩余权利金: sum(rows, "remainingPremium"),
          有效收益: sum(rows, "effectiveCarry"),
          未实现盈亏: sum(rows, "unrealizedPnL"),
          净Delta: sum(rows, "deltaExposure"),
          净Gamma: sum(rows, "gammaExposure")
        };
      });
    }

    function shockRows(account, carry) {
      const accountDelta = sum(account, "deltaExposure");
      const accountGamma = sum(account, "gammaExposure");
      const carryDelta = sum(carry, "deltaExposure");
      const carryGamma = sum(carry, "gammaExposure");
      return SHOCK_MOVES.map(move => ({
        期货变动: move,
        Carry近似PnL: carryDelta * move * 1000 + 0.5 * carryGamma * move * move * 1000,
        Account近似PnL: accountDelta * move * 1000 + 0.5 * accountGamma * move * move * 1000,
        消耗剩余权利金: ratioText(Math.abs(carryDelta * move * 1000 + 0.5 * carryGamma * move * move * 1000), metrics(carry).到期最大收益)
      }));
    }

    function sellMatrix(chain, carryMetrics) {
      const gap = carryMetrics.目标缺口;
      const maxDelta = numberInput("candidateDeltaMax", 0.40);
      const valid = chain.filter(row =>
        Number.isFinite(row.premiumPerContract) &&
        row.premiumPerContract > 0 &&
        Number.isFinite(row.absDelta) &&
        row.absDelta > 0 &&
        row.absDelta <= maxDelta &&
        Number.isFinite(row.gamma)
      );
      const groups = new Map();
      valid.forEach(row => {
        const key = `${row.dteBucket}|${row.absDeltaBucket}|${row.direction || "-"}`;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(row);
      });
      const rows = [];
      groups.forEach((items, key) => {
        const [dteB, deltaB, direction] = key.split("|");
        const avgPremium = average(items, "premiumPerContract");
        const qty = gap > 0 && avgPremium > 0 ? Math.ceil(gap / avgPremium) : 0;
        const avgSignedDelta = average(items, "signedDelta");
        const avgGamma = average(items, "gamma");
        const avgTheta = average(items, "theta");
        rows.push({
          到期: dteB,
          Delta桶: deltaB,
          方向: direction === "put" ? "Put" : direction === "call" ? "Call" : direction,
          候选数: items.length,
          平均权利金每张: avgPremium,
          平均Delta: average(items, "absDelta"),
          平均Gamma: avgGamma,
          补目标需卖: qty,
          卖后净Delta: carryMetrics.carryNetDelta - qty * avgSignedDelta,
          卖后净Gamma: carryMetrics.carryNetGamma - qty * avgGamma,
          卖后净Theta: carryMetrics.carryNetTheta - qty * avgTheta,
          样例合约: items[0].localSymbol || "-"
        });
      });
      return rows.sort((a, b) => DTE_BUCKETS.indexOf(a.到期) - DTE_BUCKETS.indexOf(b.到期) || DELTA_BUCKETS.indexOf(a.Delta桶) - DELTA_BUCKETS.indexOf(b.Delta桶) || a.方向.localeCompare(b.方向));
    }

    function eventRows(carry, carryMetrics) {
      const futuresPrice = numberInput("futuresPrice", 107);
      const bpPerPoint = numberInput("bpPerPoint", 16);
      const iv = numberInput("atmIv", 0) / 100;
      const straddle = numberInput("atmStraddle", NaN);
      const selectedDays = numberInput("eventDays", 1);
      const horizons = [
        ["今日", 1],
        ["明日", 2],
        ["后日", 3],
        ["本周", 5],
        ["自定义", selectedDays]
      ];
      return horizons.map(([name, days]) => {
        const ivMove = futuresPrice * iv * Math.sqrt(days / 365);
        const move = name === "自定义" && Number.isFinite(straddle) && straddle > 0 ? straddle : ivMove;
        const up = carryMetrics.carryNetDelta * move * 1000 + 0.5 * carryMetrics.carryNetGamma * move * move * 1000;
        const down = carryMetrics.carryNetDelta * (-move) * 1000 + 0.5 * carryMetrics.carryNetGamma * move * move * 1000;
        return {
          窗口: name,
          天数: days,
          隐含期货变动: move,
          对应CTD_bp: move * bpPerPoint,
          上行情景PnL: up,
          下行情景PnL: down,
          压力占权利金: ratioText(Math.max(Math.abs(up), Math.abs(down)), carryMetrics.到期最大收益)
        };
      });
    }

    function average(rows, field) {
      const values = rows.map(row => row[field]).filter(Number.isFinite);
      return values.length ? values.reduce((a, b) => a + b, 0) / values.length : NaN;
    }

    function targetPremium() {
      return FIXED_TARGET_PREMIUM;
    }

    function numberInput(id, fallback) {
      const value = toNum($(id).value);
      return Number.isFinite(value) ? value : fallback;
    }

    function render() {
      try {
        setError("");
        renderProductTabs();
        const rawAccount = rowsForProduct(positionRows, selectedProduct);
        const rawChain = rowsForProduct(chainRows, selectedProduct);
        const rawBars = rowsForProduct(barsRows, selectedProduct);
        const account = normalize(rowsForProduct(positionRows, selectedProduct), "position");
        const chain = normalize(rowsForProduct(chainRows, selectedProduct), "chain");
        const chainStatus = chainCoverageStatus(rawAccount, rawChain);
        const planningChain = chainStatus.view === "chain" ? chain : [];
        const bars = rawBars;
        const carry = account.filter(row => row.position < 0);
        const m = metrics(carry);
        const dte = aggregateDte(carry);
        const delta = aggregateDelta(carry);
        const shock = shockRows(account, carry);
        const matrix = sellMatrix(planningChain, m);
        const events = eventRows(carry, m);
        const actions = carry.filter(row => row.actionCandidate).sort((a, b) => riskRank(a.riskLevel) - riskRank(b.riskLevel) || a.dte - b.dte || b.absDelta - a.absDelta);
        const danger = carry.filter(row => row.riskLevel === "危急" || row.riskLevel === "危险" || row.absDelta >= 0.40).sort((a, b) => a.dte - b.dte || b.absDelta - a.absDelta);

        renderDataStatus(rawAccount, rawChain, rawBars);
        renderKlineChart(bars);
        renderDecisionCards(m, matrix, events, danger);
        $("summary").innerHTML = summaryText(m, carry, shock, events, danger, matrix);
        renderTable("incomeDte", dte, ["到期", "剩余权利金", "有效收益", "风险权利金", "未实现盈亏", "卖出张数", "平均Delta", "净Theta"]);
        renderTable("incomeDelta", delta, ["Delta桶", "卖出张数", "剩余权利金", "有效收益", "未实现盈亏", "净Delta", "净Gamma"]);
        $("sellMatrixNote").textContent = planningChain.length ? "使用当前新鲜标准期权链估算补卖候选。" : `等待新鲜标准期权链：${chainStatus.sub}`;
        renderTable("sellMatrix", matrix, ["到期", "Delta桶", "方向", "候选数", "平均权利金每张", "平均Delta", "平均Gamma", "补目标需卖", "卖后净Delta", "卖后净Gamma", "卖后净Theta", "样例合约"]);
        const boardFallback = account.filter(row =>
          Number.isFinite(row.strike) &&
          (row.direction === "call" || row.direction === "put")
        );
        renderOptionChainBoard(chain.length ? chain : boardFallback, chain.length ? chainStatus.view : "positions");
        renderTable("riskDte", dte, ["到期", "净Delta", "净Gamma", "净Theta", "危险权利金", "卖出张数"]);
        renderTable("shockTable", shock, ["期货变动", "Carry近似PnL", "Account近似PnL", "消耗剩余权利金"]);
        renderTable("eventTable", events, ["窗口", "天数", "隐含期货变动", "对应CTD_bp", "上行情景PnL", "下行情景PnL", "压力占权利金"]);
        renderTable("dangerTable", danger, riskColumns());
        renderTable("actionTable", actions, riskColumns());
        renderTable("carryTable", carry, detailColumns());
        renderTable("accountTable", account, detailColumns());
      } catch (error) {
        setError(error.message || String(error));
      }
    }

    function renderProductTabs() {
      const products = productSet();
      if (!products.length) {
        selectedProduct = "";
        $("productTabs").innerHTML = "";
        return;
      }
      if (!selectedProduct || !products.includes(selectedProduct)) selectedProduct = products[0];
      $("productTabs").innerHTML = products.map(product => (
        `<button class="product-tab ${product === selectedProduct ? "active" : ""}" data-product="${esc(product)}">${esc(product)}</button>`
      )).join("");
      $("productTabs").querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          selectedProduct = button.dataset.product;
          $("expiryFilter").value = "";
          render();
        });
      });
    }

    function renderDataStatus(accountRows, chainRowsForProduct, barsForProduct) {
      const expiries = Array.from(new Set(chainRowsForProduct.map(row => txt(row.expiry || row.expiration)).filter(Boolean))).sort();
      const barTimes = barsForProduct.map(barTime).filter(Number.isFinite).sort((a, b) => a - b);
      const firstBar = barTimes.length ? new Date(barTimes[0]).toLocaleDateString() : "";
      const lastBar = barTimes.length ? new Date(barTimes[barTimes.length - 1]).toLocaleDateString() : "";
      const chainStatus = chainCoverageStatus(accountRows, chainRowsForProduct, expiries);
      const latestBarAge = latestAgeHours(barsForProduct, ["dateChina", "date", "time", "datetime", "timestamp"]);
      const barsFresh = Number.isFinite(latestBarAge) && latestBarAge <= MAX_BARS_AGE_HOURS;
      const barsTone = barsForProduct.length >= MIN_BARS_ROWS && barsFresh ? "ready" : barsForProduct.length ? "partial" : "missing";
      const barsSub = barsForProduct.length >= MIN_BARS_ROWS && barsFresh
        ? `${firstBar} - ${lastBar}`
        : barsForProduct.length
          ? (barsFresh ? `部分K线，低于 ${MIN_BARS_ROWS} 根阈值` : `K线过期，最新约 ${num(latestBarAge, 1)} 小时前`)
          : "等待 bars CSV";
      const cards = [
        {
          label: "当前品种",
          value: selectedProduct || "-",
          tone: selectedProduct ? "ready" : "missing",
          sub: productSet().length ? `可切换 ${productSet().join(" / ")}` : "等待数据"
        },
        {
          label: "持仓数据",
          value: `${accountRows.length} 行`,
          tone: accountRows.length ? "ready" : "missing",
          sub: accountRows.length ? "已按当前品种过滤" : "当前品种无持仓"
        },
        {
          label: "期权链",
          value: `${chainRowsForProduct.length} 行`,
          tone: chainStatus.tone,
          sub: chainStatus.sub
        },
        {
          label: "K线",
          value: `${barsForProduct.length} 根`,
          tone: barsTone,
          sub: barsSub
        }
      ];
      $("dataStatus").innerHTML = cards.map(card => (
        `<div class="status-pill ${card.tone}"><strong>${esc(card.value)}</strong><span>${esc(card.label)} · ${esc(card.sub)}</span></div>`
      )).join("");
    }

    function latestAgeHours(rows, fields) {
      const latest = Math.max(...rows.map(row => {
        const value = fields.map(field => txt(row[field])).find(Boolean);
        return value ? Date.parse(value) : NaN;
      }).filter(Number.isFinite));
      if (!Number.isFinite(latest)) return NaN;
      return Math.max((Date.now() - latest) / 3600000, 0);
    }

    function optionPositionCount(rows) {
      return rows.filter(row => {
        const right = txt(row.right || row.direction).toUpperCase();
        return right === "C" || right === "P" || right === "CALL" || right === "PUT";
      }).length;
    }

    function chainCoverageStatus(accountRows, chainRowsForProduct, expiries = []) {
      const latestChainAge = latestAgeHours(chainRowsForProduct, ["snapshotTimeUtc", "snapshotTime", "timestamp"]);
      const chainFresh = Number.isFinite(latestChainAge) && latestChainAge <= MAX_CHAIN_AGE_HOURS;
      if (chainRowsForProduct.length >= MIN_CHAIN_ROWS && chainFresh) {
        return {
          tone: "ready",
          view: "chain",
          sub: `${expiries.length} 个到期，最近 ${expiries[0] || "-"}`
        };
      }
      if (chainRowsForProduct.length) {
        const stale = !chainFresh && Number.isFinite(latestChainAge);
        return {
          tone: "partial",
          view: stale ? "stale_chain" : "partial_chain",
          sub: stale ? `期权链过期，最新约 ${num(latestChainAge, 1)} 小时前` : `部分链，低于 ${MIN_CHAIN_ROWS} 行阈值`
        };
      }
      if (optionPositionCount(accountRows)) {
        return { tone: "partial", view: "positions", sub: "暂无完整链，使用持仓腿兜底" };
      }
      return { tone: "missing", view: "missing", sub: "等待期权链 CSV" };
    }

    function barTime(row) {
      return Date.parse(txt(row.dateChina || row.date || row.time || row.datetime || row.timestamp || row.snapshotTimeUtc));
    }

    function renderKlineChart(rows) {
      const bars = rows.map(row => ({
        time: barTime(row),
        open: toNum(row.open),
        high: toNum(row.high),
        low: toNum(row.low),
        close: toNum(row.close),
        volume: toNum(row.volume)
      })).filter(row =>
        Number.isFinite(row.time) &&
        Number.isFinite(row.open) &&
        Number.isFinite(row.high) &&
        Number.isFinite(row.low) &&
        Number.isFinite(row.close)
      ).sort((a, b) => a.time - b.time);

      const chart = $("klineChart");
      if (!bars.length) {
        $("klineCaption").textContent = selectedProduct ? `${selectedProduct} K线数据未生成` : "等待持仓或K线数据";
        chart.innerHTML = `<div class="muted" style="padding:24px; line-height:1.7;">等待 <strong>data/carry_dashboard_bars.csv</strong>。<br>期望字段：symbol,date,open,high,low,close,volume。<br>生成后刷新页面即可显示近一个月 30 分钟K线。</div>`;
        return;
      }

      const latest = bars[bars.length - 1].time;
      const cutoff = latest - 31 * 86400000;
      const visible = bars.filter(row => row.time >= cutoff);
      const data = visible.length ? visible : bars;
      const width = 1200;
      const height = 310;
      const pad = { left: 52, right: 62, top: 18, bottom: 34 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const minLow = Math.min(...data.map(row => row.low));
      const maxHigh = Math.max(...data.map(row => row.high));
      const spread = Math.max(maxHigh - minLow, 0.0001);
      const yMin = minLow - spread * 0.06;
      const yMax = maxHigh + spread * 0.06;
      const x = index => pad.left + (data.length === 1 ? plotW / 2 : index * plotW / (data.length - 1));
      const y = value => pad.top + (yMax - value) * plotH / (yMax - yMin);
      const candleW = clamp(plotW / Math.max(data.length, 1) * 0.62, 2, 11);
      const grid = Array.from({ length: 5 }, (_, i) => {
        const value = yMin + (yMax - yMin) * i / 4;
        const yy = y(value);
        return `<line x1="${pad.left}" y1="${yy}" x2="${width - pad.right}" y2="${yy}" stroke="#e5eaf1"/><text x="${width - pad.right + 8}" y="${yy + 4}" fill="#667085" font-size="12">${num(value, 3)}</text>`;
      }).join("");
      const candles = data.map((row, i) => {
        const xx = x(i);
        const up = row.close >= row.open;
        const color = up ? "#087443" : "#c7352b";
        const bodyTop = y(Math.max(row.open, row.close));
        const bodyBottom = y(Math.min(row.open, row.close));
        const bodyH = Math.max(bodyBottom - bodyTop, 1);
        return `<line x1="${xx}" y1="${y(row.low)}" x2="${xx}" y2="${y(row.high)}" stroke="${color}" stroke-width="1.4"/><rect x="${xx - candleW / 2}" y="${bodyTop}" width="${candleW}" height="${bodyH}" fill="${up ? "#d1fadf" : "#fee4e2"}" stroke="${color}" stroke-width="1"/>`;
      }).join("");
      const firstDate = new Date(data[0].time).toLocaleDateString();
      const lastDate = new Date(data[data.length - 1].time).toLocaleDateString();
      const ageHours = Math.max((Date.now() - latest) / 3600000, 0);
      const freshnessNote = Number.isFinite(ageHours) && ageHours > MAX_BARS_AGE_HOURS
        ? ` | K线过期，最新约 ${num(ageHours, 1)} 小时前`
        : "";
      const sampleNote = data.length < MIN_BARS_ROWS ? ` | 样本不足，低于 ${MIN_BARS_ROWS} 根阈值` : "";
      $("klineCaption").textContent = `${selectedProduct || "全部"} | ${data.length} 根 | ${firstDate} - ${lastDate}${freshnessNote}${sampleNote}`;
      chart.innerHTML = `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="K线图">${grid}<line x1="${pad.left}" y1="${height - pad.bottom}" x2="${width - pad.right}" y2="${height - pad.bottom}" stroke="#cfd6e2"/><text x="${pad.left}" y="${height - 10}" fill="#667085" font-size="12">${esc(firstDate)}</text><text x="${width - pad.right - 70}" y="${height - 10}" fill="#667085" font-size="12">${esc(lastDate)}</text>${candles}</svg>`;
    }

    function renderOptionChainBoard(chain, source = "chain") {
      const expirations = Array.from(new Set(chain.map(row => row.expiry).filter(Boolean))).sort();
      if (!expirations.length) {
        $("chainBoardTitle").textContent = `${selectedProduct || ""} 标准链表`;
        $("chainBoardCaption").textContent = "等待期权链数据";
        $("optionChainBoard").innerHTML = `<table><thead><tr><th class="text">暂无数据</th></tr></thead><tbody><tr><td class="text muted">等待期权链CSV</td></tr></tbody></table>`;
        return;
      }
      let selectedExpiry = txt($("expiryFilter").value);
      if (!expirations.includes(selectedExpiry)) {
        selectedExpiry = expirations[0];
        $("expiryFilter").value = selectedExpiry;
      }
      const rows = chain.filter(row => row.expiry === selectedExpiry);
      const calls = new Map(rows.filter(row => row.direction === "call").map(row => [String(row.strike), row]));
      const puts = new Map(rows.filter(row => row.direction === "put").map(row => [String(row.strike), row]));
      const strikes = Array.from(new Set(rows.map(row => row.strike).filter(Number.isFinite))).sort((a, b) => b - a);
      const head = [
        ["call", "C Last"], ["call", "C Bid"], ["call", "C Ask"], ["call", "C Delta"], ["call", "C Gamma"], ["call", "C IV"], ["call", "C OI"], ["call", "C Vol"],
        ["strike", "Strike"],
        ["put", "P Last"], ["put", "P Bid"], ["put", "P Ask"], ["put", "P Delta"], ["put", "P Gamma"], ["put", "P IV"], ["put", "P OI"], ["put", "P Vol"]
      ].map(([cls, label]) => `<th class="${cls}">${label}</th>`).join("");
      const body = strikes.map(strike => {
        const call = calls.get(String(strike)) || {};
        const put = puts.get(String(strike)) || {};
        const callCells = [call.last, call.bid, call.ask, call.signedDelta, call.gamma, call.iv, call.openInterest, call.volume].map((value, i) => chainCell(value, i >= 6, "call")).join("");
        const putCells = [put.last, put.bid, put.ask, put.signedDelta, put.gamma, put.iv, put.openInterest, put.volume].map((value, i) => chainCell(value, i >= 6, "put")).join("");
        return `<tr>${callCells}<td class="strike">${num(strike, 3)}</td>${putCells}</tr>`;
      }).join("");
      const sourceMeta = {
        chain: ["标准链表", ""],
        stale_chain: ["过期期权链", " | 期权链快照已超过新鲜度阈值"],
        partial_chain: ["部分链表", " | 期权链行数低于完整阈值"],
        positions: ["持仓链视图", " | 暂无完整期权链，当前为持仓腿报价"]
      }[source] || ["标准链表", ""];
      $("chainBoardTitle").textContent = `${selectedProduct || ""} ${sourceMeta[0]}`;
      $("chainBoardCaption").textContent = `${selectedExpiry} | ${strikes.length} strikes | last / bid / ask / delta / gamma / iv / oi / volume${sourceMeta[1]}`;
      $("optionChainBoard").innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    function chainCell(value, integerLike, side) {
      if (!Number.isFinite(value)) return `<td class="${side}">-</td>`;
      if (integerLike) return `<td class="${side}">${num(value, 0)}</td>`;
      return `<td class="${side}">${Math.abs(value) < 0.01 ? num(value, 5) : num(value, 3)}</td>`;
    }

    function renderDecisionCards(m, matrix, events, danger) {
      const positiveQty = matrix.filter(row => row.补目标需卖 > 0).map(row => row.补目标需卖);
      const bestQty = positiveQty.length ? Math.min(...positiveQty) : 0;
      const eventStress = events.length ? Math.max(...events.map(row => Math.max(Math.abs(row.上行情景PnL), Math.abs(row.下行情景PnL)))) : NaN;
      const topDanger = danger[0];
      const cards = [
        ["到期最大收益", money(m.到期最大收益), "green", "卖出期权到期归零时的剩余权利金"],
        ["有效收益", money(m.有效收益), m.carryQualityRatio < 0.5 ? "amber" : "green", `质量 ${pct(m.carryQualityRatio)}`],
        ["目标缺口", money(m.目标缺口), m.目标缺口 > 0 ? "red" : "green", `目标 ${money(targetPremium())}`],
        ["估算需补卖", bestQty ? `${bestQty} 张起` : "无需补卖", bestQty ? "amber" : "green", matrix.length ? "按上传期权链估算" : "等待期权链"],
        ["组合方向", m.carryNetDelta > 0.05 ? "偏多" : m.carryNetDelta < -0.05 ? "偏空" : "中性", "cyan", `净Delta ${num(m.carryNetDelta, 3)}`],
        ["Gamma集中", pct(m.gammaShare02), m.gammaShare02 >= 0.5 ? "red" : "green", "0-2DTE gamma占比"],
        ["事件压力", money(eventStress), eventStress > m.到期最大收益 * 0.5 ? "red" : "amber", `占权利金 ${ratioText(eventStress, m.到期最大收益)}`],
        ["最危险仓位", topDanger ? topDanger.localSymbol || "-" : "暂无", topDanger ? "red" : "green", topDanger ? `${topDanger.riskLevel} | DTE ${num(topDanger.dte, 0)} | |Delta| ${num(topDanger.absDelta, 2)}` : "无危急/危险腿"]
      ];
      $("decisionCards").innerHTML = cards.map(([label, value, tone, sub]) => (
        `<div class="card ${tone}"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div><div class="sub">${esc(sub)}</div>${qualityBar(label, value, m)}</div>`
      )).join("");
    }

    function qualityBar(label, value, m) {
      if (label === "有效收益") return `<div class="bar ${m.carryQualityRatio < 0.5 ? "red" : "green"}"><span style="width:${clamp((m.carryQualityRatio || 0) * 100, 0, 100)}%"></span></div>`;
      if (label === "Gamma集中") return `<div class="bar ${m.gammaShare02 >= 0.5 ? "red" : "green"}"><span style="width:${clamp((m.gammaShare02 || 0) * 100, 0, 100)}%"></span></div>`;
      if (label === "目标缺口") return `<div class="bar ${m.目标缺口 > 0 ? "amber" : "green"}"><span style="width:${clamp((1 - m.目标缺口 / Math.max(targetPremium(), 1)) * 100, 0, 100)}%"></span></div>`;
      return "";
    }

    function summaryText(m, carry, shock, events, danger, matrix) {
      if (!positionRows.length) return '<span class="muted">请导入当前持仓，或加载样例。</span>';
      const bias = m.carryNetDelta > 0.05 ? "偏多" : m.carryNetDelta < -0.05 ? "偏空" : "接近中性";
      const deltaRisk = Math.abs(m.carryNetDelta) * 0.5 * 1000;
      const gammaRisk = Math.abs(0.5 * m.carryNetGamma * 0.5 * 0.5 * 1000);
      const mainRisk = deltaRisk >= gammaRisk ? "Delta" : "Gamma";
      const dangerous = danger.slice(0, 4).map(row => `${row.localSymbol || "-"}(${row.riskLevel}, DTE ${num(row.dte, 0)}, |Delta| ${num(row.absDelta, 2)})`);
      const pnl = move => {
        const row = shock.find(item => item.期货变动 === move);
        return row ? money(row.Carry近似PnL) : "-";
      };
      const best = matrix.find(row => row.补目标需卖 > 0);
      const event = events[0] || {};
      return [
        `- 当前卖权组合${bias}，净Delta=${num(m.carryNetDelta, 3)}，净Gamma=${num(m.carryNetGamma, 3)}，净Theta=${num(m.carryNetTheta, 3)}。`,
        `- 到期最大收益 ${money(m.到期最大收益)}，有效收益 ${money(m.有效收益)}，距离目标 ${money(m.目标缺口)}；${best ? `按期权链估算，可从 ${best.到期}/${best.Delta桶}/${best.方向} 开始，约需 ${best.补目标需卖} 张。` : "上传期权链后会生成补卖矩阵。"}`,
        `- 风险主要来自 ${mainRisk}；0-2DTE Gamma ${m.gammaShare02 >= 0.5 ? "过度集中" : "未明显过度集中"}，占比 ${pct(m.gammaShare02)}。`,
        `- 事件定价：今日隐含期货变动 ${num(event.隐含期货变动, 3)}，约 ${num(event.对应CTD_bp, 2)}bp；压力约 ${ratioText(Math.max(Math.abs(event.上行情景PnL || 0), Math.abs(event.下行情景PnL || 0)), m.到期最大收益)} 的剩余权利金。`,
        `- 最危险仓位：${dangerous.length ? dangerous.join(", ") : "暂无危急/危险腿"}。`,
        `- Carry shock PnL：-0.30=${pnl(-0.30)}，+0.30=${pnl(0.30)}，-0.50=${pnl(-0.50)}，+0.50=${pnl(0.50)}。`
      ].join("\n");
    }

    function renderTable(id, rows, cols) {
      if (!rows.length) {
        $(id).innerHTML = `<table><thead><tr><th class="text">暂无数据</th></tr></thead><tbody><tr><td class="text muted">等待导入或无匹配记录</td></tr></tbody></table>`;
        return;
      }
      const head = cols.map(col => `<th class="${isText(col) ? "text" : ""}">${esc(col)}</th>`).join("");
      const body = rows.map(row => `<tr>${cols.map(col => cell(col, row[col])).join("")}</tr>`).join("");
      $(id).innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    function cell(col, value) {
      if (col === "风险等级") return `<td class="text"><span class="badge ${badgeClass(value)}">${esc(value || "")}</span></td>`;
      if (typeof value === "boolean") return `<td>${value ? "是" : "否"}</td>`;
      if (typeof value === "number") return `<td class="${pnlCol(col, value)}">${format(col, value)}</td>`;
      return `<td class="${isText(col) ? "text" : ""}">${esc(value ?? "")}</td>`;
    }

    function riskColumns() {
      return ["风险等级", "操作候选", "品种", "标记", "DTE", "方向", "行权价", "|Delta|", "Delta", "价格", "Gamma", "持仓", "Delta暴露", "Gamma暴露", "Theta暴露", "剩余权利金", "有效收益", "风险权利金", "合约", "到期", "IV", "Theta", "市值", "未实现盈亏"];
    }

    function detailColumns() {
      return ["品种", "标记", "DTE", "方向", "行权价", "|Delta|", "价格", "Gamma", "Delta", "持仓", "每张权利金", "剩余权利金", "目标月收益", "目标张数", "目标Delta", "合约", "到期", "IV", "Theta", "市值", "未实现盈亏", "Delta暴露", "Gamma暴露", "Theta暴露", "是否卖权", "是否买权", "风险等级", "操作候选"];
    }

    function translateRow(row) {
      return {
        "风险等级": row.riskLevel,
        "操作候选": row.actionCandidate,
        "品种": row.product,
        "标记": row.flag,
        "DTE": row.dte,
        "方向": row.direction === "put" ? "Put" : row.direction === "call" ? "Call" : row.direction,
        "行权价": row.strike,
        "|Delta|": row.absDelta,
        "Delta": row.signedDelta,
        "价格": row.price,
        "Gamma": row.gamma,
        "持仓": row.position,
        "Delta暴露": row.deltaExposure,
        "Gamma暴露": row.gammaExposure,
        "Theta暴露": row.thetaExposure,
        "剩余权利金": row.remainingPremium,
        "有效收益": row.effectiveCarry,
        "风险权利金": row.riskPremium,
        "每张权利金": row.premiumPerContract,
        "目标月收益": row.targetMonthlyPremium,
        "目标张数": row.contractsForTarget,
        "目标Delta": row.deltaAtTarget,
        "合约": row.localSymbol,
        "到期": row.expiry,
        "IV": row.iv,
        "Theta": row.theta,
        "市值": row.marketValue,
        "未实现盈亏": row.unrealizedPnL,
        "是否卖权": row.isShortOption,
        "是否买权": row.isLongOption
      };
    }

    const originalRenderTable = renderTable;
    renderTable = function(id, rows, cols) {
      const mapped = rows.map(row => row && row.riskLevel !== undefined ? translateRow(row) : row);
      originalRenderTable(id, mapped, cols);
    };

    function isText(col) {
      return ["品种", "到期", "Delta桶", "方向", "样例合约", "窗口", "消耗剩余权利金", "压力占权利金", "风险等级", "操作候选", "标记", "合约"].includes(col);
    }

    function format(col, value) {
      if (!Number.isFinite(value)) return "-";
      if (/权利金|收益|盈亏|市值|PnL/.test(col)) return money(value);
      if (/IV|质量|占比/.test(col)) return pct(value);
      if (/DTE|张数|候选数|持仓|天数/.test(col)) return num(value, 0);
      if (/价格|Gamma|Theta/.test(col)) return num(value, 5);
      if (/变动/.test(col)) return (value > 0 ? "+" : "") + num(value, 2);
      if (/bp/.test(col)) return num(value, 2);
      return num(value, 3);
    }

    function pnlCol(col, value) {
      if (!/PnL|盈亏|暴露|净Delta|净Gamma|净Theta|市值/.test(col)) return "";
      return value > 0 ? "pos" : value < 0 ? "neg" : "";
    }

    function badgeClass(value) {
      if (value === "买权/排除") return "排除";
      return value || "排除";
    }

    function riskRank(level) {
      return { "危急": 0, "危险": 1, "警惕": 2, "正常": 3, "安全": 4 }[level] ?? 9;
    }

    function num(value, digits = 2) {
      return Number.isFinite(value) ? value.toLocaleString(undefined, { minimumFractionDigits: digits, maximumFractionDigits: digits }) : "-";
    }

    function money(value) {
      return Number.isFinite(value) ? "$" + value.toLocaleString(undefined, { maximumFractionDigits: 0 }) : "-";
    }

    function pct(value) {
      return Number.isFinite(value) ? (value * 100).toFixed(1) + "%" : "-";
    }

    function ratioText(value, base) {
      if (!Number.isFinite(value) || !Number.isFinite(base) || base === 0) return "-";
      return (value / base * 100).toFixed(1) + "%";
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function setError(message) {
      $("error").textContent = message;
    }

    function samplePositions() {
      return [
        { symbol: "ZF", flag: "", dte: 0, direction: "put", strike: 107.25, delta: 0.45, price: 0.065, gamma: 1.2, signedDelta: -0.45, position: -1, premiumPerContract: 65, localSymbol: "VF5M6 P1072", expiry: "20260629", iv: 0.10, theta: -0.020, marketValue: -65, unrealizedPnL: 11 },
        { symbol: "ZF", flag: "", dte: 1, direction: "put", strike: 106.50, delta: 0.18, price: 0.003, gamma: 0.12, signedDelta: -0.18, position: -2, premiumPerContract: 3, localSymbol: "GF5M6 P1065", expiry: "20260630", iv: 0.05, theta: -0.002, marketValue: -6, unrealizedPnL: 20 },
        { symbol: "ZN", flag: "", dte: 8, direction: "call", strike: 111.00, delta: 0.14, price: 0.035, gamma: 0.08, signedDelta: 0.14, position: -2, premiumPerContract: 35, localSymbol: "OZNN6 C1110", expiry: "20260707", iv: 0.09, theta: -0.004, marketValue: -70, unrealizedPnL: 18 },
        { symbol: "ZN", flag: "", dte: 11, direction: "put", strike: 109.50, delta: 0.10, price: 0.021, gamma: 0.04, signedDelta: -0.10, position: 1, premiumPerContract: 21, localSymbol: "OZNN6 P1095", expiry: "20260710", iv: 0.08, theta: -0.002, marketValue: 21, unrealizedPnL: -2 },
        { symbol: "ZC", flag: "", dte: 14, direction: "put", strike: 420.00, delta: 0.12, price: 3.25, gamma: 0.03, signedDelta: -0.12, position: -1, premiumPerContract: 162.5, multiplier: 50, localSymbol: "OZCU6 P420", expiry: "20260717", iv: 0.22, theta: -0.015, marketValue: -162.5, unrealizedPnL: 9 }
      ];
    }

    function sampleChain() {
      const rows = [];
      const snapshotTimeUtc = new Date().toISOString();
      for (const product of ["ZF", "ZN", "ZC"]) {
        const base = product === "ZF" ? 107 : product === "ZN" ? 110 : 420;
        const multiplier = product === "ZC" ? 50 : 1000;
        for (const dte of [1, 2, 5, 14, 28]) {
          for (const direction of ["put", "call"]) {
            for (const delta of [0.07, 0.12, 0.18, 0.28, 0.38]) {
            const signed = direction === "put" ? -delta : delta;
            const price = product === "ZC" ? 1.2 + delta * 9 + dte * 0.08 : 0.002 + delta * 0.08 + dte * 0.0006;
            rows.push({
              symbol: product,
              dte,
              direction,
              strike: direction === "put" ? base - delta * (product === "ZC" ? 70 : 4) : base + delta * (product === "ZC" ? 70 : 4),
              delta,
              signedDelta: signed,
              price,
              bid: price * 0.94,
              ask: price * 1.06,
              last: price,
              gamma: Math.max(0.02, 0.6 / Math.sqrt(dte + 1) * delta),
              theta: -(0.001 + delta * 0.01),
              openInterest: Math.round(50 + dte * 4 + delta * 700),
              volume: Math.round(dte + delta * 80),
              multiplier,
              premiumPerContract: price * multiplier,
              localSymbol: `${product}${direction === "put" ? "P" : "C"}${dte}-${Math.round(delta * 100)}`,
              expiry: "20260724",
              iv: 0.06 + delta * 0.05,
              snapshotTimeUtc
            });
            }
          }
        }
      }
      return rows;
    }

    function sampleBars() {
      const rows = [];
      const now = Date.now();
      for (const product of ["ZF", "ZN", "ZC"]) {
        let price = product === "ZF" ? 107 : product === "ZN" ? 110 : 420;
        for (let i = 31 * 48; i >= 0; i--) {
          const time = new Date(now - i * 30 * 60000);
          const drift = Math.sin(i / 12) * (product === "ZC" ? 0.75 : 0.025) + (product === "ZN" ? 0.01 : product === "ZC" ? 0.12 : -0.006);
          const open = price;
          const close = price + drift;
          const high = Math.max(open, close) + (product === "ZC" ? 1.0 : 0.025) + Math.abs(Math.sin(i)) * (product === "ZC" ? 0.25 : 0.01);
          const low = Math.min(open, close) - (product === "ZC" ? 1.0 : 0.025) - Math.abs(Math.cos(i)) * (product === "ZC" ? 0.25 : 0.01);
          rows.push({ symbol: product, date: time.toISOString(), open, high, low, close, volume: 200 + (i % 17) * 8 });
          price = close;
        }
      }
      return rows;
    }

    loadDefaultData();
  </script>
