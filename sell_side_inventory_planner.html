<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>卖方期权库存规划器</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --ink: #182230;
      --muted: #667085;
      --line: #d0d7e2;
      --soft: #eef2f6;
      --blue: #155eef;
      --green: #087443;
      --amber: #b54708;
      --red: #b42318;
      --cyan: #0e7090;
      --violet: #6938ef;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.07);
    }

    * { box-sizing: border-box; }
    html { width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      font-size: 14px;
      letter-spacing: 0;
      width: 100%;
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 12px 18px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 21px;
      line-height: 1.25;
    }

    h2 {
      margin: 20px 0 10px;
      font-size: 16px;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    main {
      max-width: 100%;
      margin: 0 auto;
      padding: 14px 18px 36px;
    }

    button, input, select, textarea {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
    }

    button {
      height: 34px;
      padding: 0 11px;
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      cursor: pointer;
      white-space: nowrap;
    }

    button.secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    input, select {
      height: 34px;
      padding: 0 8px;
      min-width: 0;
    }

    input[type="file"] {
      padding-top: 6px;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr)) repeat(4, minmax(92px, auto));
      gap: 8px;
      align-items: end;
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
      align-items: end;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .grid-5 {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 10px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .grid-2 > *, .planner-layout > *, .stack > *, .table-wrap {
      min-width: 0;
    }

    .metric {
      border-left: 5px solid var(--blue);
      padding: 8px 10px;
      background: var(--panel);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-height: 80px;
    }

    .metric.green { border-left-color: var(--green); }
    .metric.amber { border-left-color: var(--amber); }
    .metric.red { border-left-color: var(--red); }
    .metric.cyan { border-left-color: var(--cyan); }
    .metric.violet { border-left-color: var(--violet); }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
    }
    .metric small {
      color: var(--muted);
      line-height: 1.4;
    }

    .note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .error {
      color: var(--red);
      min-height: 18px;
      margin-top: 7px;
      font-size: 13px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
    }

    th, td {
      padding: 5px 7px;
      border-bottom: 1px solid var(--soft);
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      color: #344054;
      font-size: 12px;
      z-index: 1;
    }

    td.text, th.text {
      text-align: left;
    }

    .qty {
      width: 58px;
      text-align: right;
    }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--soft);
      color: var(--ink);
    }

    .badge.green { background: #dcfae6; color: var(--green); }
    .badge.amber { background: #fef0c7; color: var(--amber); }
    .badge.red { background: #fee4e2; color: var(--red); }
    .badge.blue { background: #dbeafe; color: var(--blue); }

    .bars {
      display: grid;
      gap: 7px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 72px 1fr 78px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }

    .bar {
      height: 10px;
      background: var(--soft);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: var(--blue);
      min-width: 1px;
    }

    .heatmaps {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .planner-layout {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .candidate-combo-panel {
      padding: 12px;
    }

    .chain-scroll {
      max-height: calc(100vh - 120px);
      overflow: auto;
      padding-right: 4px;
    }

    .sticky-side {
      position: sticky;
      top: 88px;
      z-index: 4;
      max-height: 42vh;
      overflow: auto;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
      padding-left: 4px;
    }

    .combo-grid {
      display: grid;
      grid-template-columns: minmax(180px, 0.8fr) minmax(280px, 1fr) minmax(280px, 1fr);
      gap: 10px;
      align-items: start;
    }

    .choice-box {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: start;
      min-height: 34px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .choice-box label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f8fafc;
      color: var(--ink);
      font-size: 12px;
    }

    .choice-box input {
      height: auto;
      margin: 0;
    }

    .top-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
      gap: 12px;
      align-items: start;
    }

    .top-layout h2 {
      margin-top: 0;
    }

    .target-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(130px, 1fr));
      gap: 8px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .compact-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
    }

    .option-cross table {
      min-width: 980px;
      table-layout: fixed;
      font-size: 12px;
    }

    .option-cross th.call, .option-cross td.call {
      background: #fff7ed;
    }

    .option-cross th.put, .option-cross td.put {
      background: #eff6ff;
    }

    .option-cross th.strike, .option-cross td.strike {
      background: #f8fafc;
      text-align: center;
      font-weight: 700;
      color: var(--ink);
      width: 86px;
      white-space: normal;
    }

    .option-cross td {
      white-space: nowrap;
      vertical-align: top;
      padding: 4px 5px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .option-cross th {
      padding: 4px 5px;
      font-size: 11px;
    }

    .chain-cell {
      display: flex;
      align-items: center;
      gap: 5px;
      line-height: 1.25;
      min-height: 30px;
      flex-wrap: wrap;
    }

    .chain-line {
      display: inline-flex;
      align-items: baseline;
      gap: 3px;
      color: var(--muted);
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 5px;
      background: rgba(255,255,255,0.72);
    }

    .chain-main {
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      margin-right: 4px;
    }

    td.call .chain-cell { justify-content: flex-end; text-align: right; }
    td.put .chain-cell { justify-content: flex-start; text-align: left; }

    .strike-meta {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .strike-value {
      display: block;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.1;
    }

    .chart-panel {
      display: grid;
      gap: 8px;
    }

    .chart-toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .price-chart {
      width: 100%;
      height: 240px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .future-price-prompt {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 8px;
      align-items: end;
    }

    .spot-row td {
      background: #ecfdf3;
      color: var(--green);
      text-align: center;
      font-weight: 700;
    }

    .chain-expiry {
      margin: 0 0 10px;
      color: #344054;
      font-size: 13px;
    }

    .selected-list {
      display: grid;
      gap: 7px;
    }

    .selected-item {
      border: 1px solid var(--line);
      border-left: 4px solid var(--blue);
      border-radius: 7px;
      padding: 8px;
      background: #fff;
      display: grid;
      gap: 4px;
      font-size: 12px;
    }

    .heatmap-grid {
      display: grid;
      gap: 4px;
      grid-template-columns: repeat(auto-fit, minmax(74px, 1fr));
    }

    .heat-cell {
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px;
      background: #fff;
      display: grid;
      gap: 3px;
    }

    .heat-cell strong {
      font-size: 12px;
    }

    .heat-cell span {
      color: var(--muted);
      font-size: 11px;
    }

    .warning-list {
      display: grid;
      gap: 6px;
    }

    .warning {
      border-left: 4px solid var(--amber);
      background: #fffbeb;
      border-radius: 6px;
      padding: 7px 8px;
      font-size: 12px;
      line-height: 1.4;
    }

    @media (max-width: 1100px) {
      .toolbar, .config-grid, .grid-5, .grid-2, .heatmaps, .compact-grid, .top-layout, .target-grid, .chart-toolbar, .future-price-prompt, .combo-grid {
        grid-template-columns: 1fr;
      }
      table { min-width: 0; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Sell-Side Option Inventory Planner｜卖方期权库存规划器</h1>
    <div class="toolbar">
      <label>当前持仓 CSV/JSON<input id="positionFile" type="file" accept=".csv,.json,.txt" /></label>
      <label>期权链 CSV/JSON<input id="chainFile" type="file" accept=".csv,.json,.txt" /></label>
      <label>K线 CSV/JSON<input id="barsFile" type="file" accept=".csv,.json,.txt" /></label>
      <label>当前品种
        <select id="activeUnderlying">
          <option value="ZF">ZF</option>
          <option value="ZN">ZN</option>
          <option value="ZC">ZC</option>
        </select>
      </label>
      <label>链表颜色
        <select id="heatMetric">
          <option value="finalScore">综合分</option>
          <option value="estimatedCredit">权利金</option>
          <option value="gamma">Gamma</option>
          <option value="distributionScore">分布分</option>
        </select>
      </label>
      <button id="loadDefault">读取默认CSV</button>
      <button id="loadSample" class="secondary">加载样例</button>
      <button id="exportJson" class="secondary">导出JSON</button>
      <button id="exportCsv" class="secondary">导出CSV</button>
      <button id="exportMarkdown" class="secondary">导出Markdown</button>
    </div>
    <div id="error" class="error"></div>
  </header>

  <main>
    <section class="top-layout">
      <div class="panel">
        <h2>用户假设与交易区域</h2>
        <div class="config-grid">
          <label>本金<input id="capital" type="number" value="20000" step="100" /></label>
          <label>月目标收益率<input id="targetReturn" type="number" value="10" step="0.1" /></label>
          <label>本月已完成PnL<input id="realizedPnl" type="number" value="0" step="10" /></label>
          <label>剩余交易日<input id="remainingDays" type="number" value="20" step="1" /></label>
          <label>当前期货价<input id="manualFuturePrice" type="number" value="" step="0.001" placeholder="可手填" /></label>
          <label>Put 支撑区
            <select id="putZonePreset">
              <option value="normal">默认支撑区</option>
              <option value="wide">更宽</option>
              <option value="tight">更贴近</option>
            </select>
          </label>
          <label>Call 压力区
            <select id="callZonePreset">
              <option value="normal">默认压力区</option>
              <option value="wide">更宽</option>
              <option value="tight">更贴近</option>
            </select>
          </label>
          <label>Put Delta 上限<div id="putDeltaChoices" class="choice-box"></div></label>
          <label>Call Delta 上限<div id="callDeltaChoices" class="choice-box"></div></label>
          <label>库存DTE
            <select id="inventoryDtePreset">
              <option value="all" selected>全部库存</option>
              <option value="short">0DTE-一周内</option>
              <option value="near">0-2DTE</option>
            </select>
          </label>
          <label>新开DTE<div id="newDteChoices" class="choice-box"></div></label>
          <label>权利金口径
            <select id="creditSource">
              <option value="mid">mid</option>
              <option value="bid">bid</option>
            </select>
          </label>
          <label>候选显示数量<input id="candidateLimit" type="number" value="80" min="10" step="10" /></label>
          <button id="recompute">重新计算</button>
        </div>
        <p class="note">当前只分析选中品种。核心规划只统计卖出期权库存；多头期权视为彩票/凸性仓位，不参与核心库存计算。到期轴会补齐两周内的空白日期，并把更远到期汇总到 15DTE+。</p>
      </div>
      <div class="panel">
        <h2>目标压力</h2>
        <section id="targetSummary" class="target-grid"></section>
      </div>
    </section>

    <h2>当前卖方库存</h2>
    <section class="grid-2">
      <div class="panel">
        <h3>库存分布</h3>
        <div id="inventoryBars" class="bars"></div>
      </div>
      <div class="panel">
        <h3>Greeks 与方向</h3>
        <div id="greekSummary" class="grid-5"></div>
        <div id="futurePricePrompt" class="future-price-prompt"></div>
        <h3 style="margin-top:12px;">按 DTE 的 Greeks 分布</h3>
        <div id="greekDteTable" class="table-wrap"></div>
      </div>
    </section>

    <h2>底层资产走势</h2>
    <section class="panel chart-panel">
      <div class="chart-toolbar">
        <div id="priceChartNote" class="note"></div>
        <button id="loadDefaultBars" class="secondary">读取默认K线</button>
      </div>
      <canvas id="priceChart" class="price-chart"></canvas>
    </section>

    <h2>当前库存行权节点</h2>
    <section class="panel option-cross">
      <div class="note" id="inventoryChainNote"></div>
      <div id="inventoryChain"></div>
    </section>

    <h2>候选期权链与新增敞口</h2>
    <section class="panel candidate-combo-panel">
      <div class="planner-layout">
        <aside class="sticky-side combo-grid">
          <div>
            <h3>已选择新增期权</h3>
            <div id="selectedOptions" class="selected-list"></div>
          </div>
          <div>
            <h3>Before / Added / After</h3>
            <div id="beforeAfter" class="table-wrap"></div>
          </div>
          <div>
            <h3>调整后按 DTE 分类</h3>
            <div id="afterDteTable" class="table-wrap"></div>
          </div>
        </aside>
        <div class="option-cross chain-scroll">
          <h3>按到期日排列的候选期权链</h3>
          <div class="note" id="candidateNote"></div>
          <div id="candidateTable"></div>
        </div>
      </div>
    </section>

    <h2>调整后节点可视化</h2>
    <section class="panel option-cross">
      <h3>节点十字图</h3>
      <div id="nodeTable"></div>
      <div id="warnings" class="warning-list" hidden></div>
    </section>
  </main>

  <script>
    const DEFAULT_POSITIONS_PATH = "data/carry_dashboard_positions.csv";
    const DEFAULT_CHAIN_PATH = "data/carry_dashboard_chain.csv";
    const DEFAULT_BARS_PATH = "data/carry_dashboard_future_bars.csv";
    const CLEAN_VERIFY_PATHS = {
      ZF: {
        positions: "data/clean_verify/dashboard_treasury_positions.csv",
        chain: "data/clean_verify/ZF_FOP_Static_202609_202612_from_20260706_to_all_snapshot.csv",
        futurePrices: "data/clean_verify/ZF_FOP_Static_202609_202612_from_20260706_to_all_future_prices.csv"
      },
      ZN: {
        positions: "data/clean_verify/dashboard_treasury_positions.csv",
        chain: "data/clean_verify/ZN_FOP_Static_202609_202612_from_20260702_to_all_snapshot.csv",
        futurePrices: "data/clean_verify/ZN_FOP_Static_202609_202612_from_20260702_to_all_future_prices.csv"
      }
    };
    const EPS = 1e-9;
    const PRODUCT_PRESETS = {
      ZF: {
        multiplier: 1000,
        spotFallback: 107,
        putZones: { normal: [106, 107], wide: [105, 107.25], tight: [106.5, 107.25] },
        callZones: { normal: [107.25, 108.5], wide: [107, 110], tight: [107.25, 108] }
      },
      ZN: {
        multiplier: 1000,
        spotFallback: 111,
        putZones: { normal: [109, 111], wide: [108, 111.5], tight: [110, 111] },
        callZones: { normal: [110.5, 112.5], wide: [110, 114], tight: [111, 112] }
      },
      ZC: {
        multiplier: 50,
        spotFallback: 420,
        putZones: { normal: [390, 420], wide: [360, 425], tight: [405, 425] },
        callZones: { normal: [430, 470], wide: [425, 500], tight: [430, 455] }
      }
    };
    const DELTA_THRESHOLDS = [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35];
    const DTE_PRESETS = {
      inventory: { short: { put: [0, 7], call: [0, 7] }, all: { put: [0, 999], call: [0, 999] }, near: { put: [0, 2], call: [0, 2] } },
      newOpen: { balanced: { put: [1, 15], call: [1, 4] }, today: { put: [0, 2], call: [0, 2] }, week: { put: [0, 7], call: [0, 7] } }
    };
    let positionRows = [];
    let chainRows = [];
    let futurePriceRows = [];
    let barsRows = [];
    let candidates = [];
    let shortPositions = [];
    let futurePositions = [];
    let proposed = {};

    const $ = id => document.getElementById(id);
    const controls = [
      "activeUnderlying", "capital", "targetReturn", "realizedPnl", "remainingDays", "manualFuturePrice", "putZonePreset",
      "callZonePreset", "inventoryDtePreset", "creditSource", "candidateLimit", "heatMetric"
    ];
    controls.forEach(id => $(id).addEventListener("input", render));
    ["newDteChoices", "putDeltaChoices", "callDeltaChoices"].forEach(id => $(id).addEventListener("change", render));
    $("activeUnderlying").addEventListener("change", () => { proposed = {}; render(); });
    $("recompute").addEventListener("click", render);
    $("loadDefault").addEventListener("click", loadDefaultData);
    $("loadDefaultBars").addEventListener("click", loadDefaultBars);
    $("loadSample").addEventListener("click", () => {
      positionRows = samplePositions();
      chainRows = sampleChain();
      futurePriceRows = sampleFuturePrices();
      barsRows = sampleBars();
      proposed = {};
      render();
    });
    $("positionFile").addEventListener("change", event => loadFile(event, rows => { positionRows = rows; proposed = {}; render(); }));
    $("chainFile").addEventListener("change", event => loadFile(event, rows => { chainRows = rows; proposed = {}; render(); }));
    $("barsFile").addEventListener("change", event => loadFile(event, rows => { barsRows = rows; render(); }));
    $("exportJson").addEventListener("click", () => downloadText("sell-side-plan.json", JSON.stringify(exportPlan(), null, 2)));
    $("exportCsv").addEventListener("click", () => downloadText("sell-side-plan.csv", exportCsv()));
    $("exportMarkdown").addEventListener("click", () => downloadText("sell-side-plan.md", exportMarkdown()));

    async function loadFile(event, callback) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      callback(parseInput(await file.text()));
    }

    async function loadDefaultData() {
      try {
        const paths = defaultPathsFor(config().underlying);
        const [positions, chain, futurePrices, bars] = await Promise.all([
          fetchRows(paths.positions),
          fetchRows(paths.chain),
          paths.futurePrices ? fetchRows(paths.futurePrices).catch(() => []) : Promise.resolve([]),
          fetchRows(DEFAULT_BARS_PATH).catch(() => [])
        ]);
        positionRows = positions;
        chainRows = chain;
        futurePriceRows = futurePrices;
        barsRows = bars;
        proposed = {};
        setError("");
        render();
      } catch (error) {
        setError(`读取默认CSV失败：${error.message || error}`);
      }
    }

    function defaultPathsFor(underlying) {
      return CLEAN_VERIFY_PATHS[underlying] || {
        positions: DEFAULT_POSITIONS_PATH,
        chain: DEFAULT_CHAIN_PATH,
        futurePrices: ""
      };
    }

    async function loadDefaultBars() {
      try {
        barsRows = await fetchRows(DEFAULT_BARS_PATH);
        setError("");
        render();
      } catch (error) {
        setError(`读取默认K线失败：${error.message || error}`);
      }
    }

    async function fetchRows(path) {
      if (window.location.protocol === "file:") {
        throw new Error("浏览器不允许 file:// 页面自动读取 data/*.csv；请用本地 HTTP 打开，例如运行 serve-inventory-planner。");
      }
      let response;
      try {
        response = await fetch(`${path}?t=${Date.now()}`, { cache: "no-store" });
      } catch (error) {
        throw new Error(`${path}: ${error.message || error}`);
      }
      if (!response.ok) throw new Error(`${path}: ${response.status}`);
      return parseInput(await response.text());
    }

    function parseInput(raw) {
      const text = String(raw || "").trim();
      if (!text) return [];
      if (text.startsWith("[") || text.startsWith("{")) {
        const parsed = JSON.parse(text);
        return Array.isArray(parsed) ? parsed : (Array.isArray(parsed.rows) ? parsed.rows : [parsed]);
      }
      return parseCSV(text);
    }

    function parseCSV(text) {
      const rows = [];
      let row = [], cell = "", quoted = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (ch === '"' && quoted && next === '"') { cell += '"'; i++; }
        else if (ch === '"') quoted = !quoted;
        else if (ch === "," && !quoted) { row.push(cell); cell = ""; }
        else if ((ch === "\n" || ch === "\r") && !quoted) {
          if (ch === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(value => value.trim() !== "")) rows.push(row);
          row = []; cell = "";
        } else {
          cell += ch;
        }
      }
      row.push(cell);
      if (row.some(value => value.trim() !== "")) rows.push(row);
      if (rows.length < 2) return [];
      const headers = rows[0].map(value => value.trim().replace(/^\ufeff/, ""));
      return rows.slice(1).map(values => Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""])));
    }

    function config() {
      const underlying = $("activeUnderlying").value || "ZF";
      const preset = PRODUCT_PRESETS[underlying] || PRODUCT_PRESETS.ZF;
      const inventoryDte = DTE_PRESETS.inventory[$("inventoryDtePreset").value] || DTE_PRESETS.inventory.short;
      const selectedNewDtes = checkedNumbers("newDteChoices");
      const selectedPutDelta = checkedNumbers("putDeltaChoices");
      const selectedCallDelta = checkedNumbers("callDeltaChoices");
      return {
        underlying,
        capital: numIn("capital", 20000),
        targetReturn: numIn("targetReturn", 10) / 100,
        realizedPnl: numIn("realizedPnl", 0),
        remainingDays: Math.max(numIn("remainingDays", 20), 1),
        manualFuturePrice: toNum($("manualFuturePrice").value),
        allowed: [underlying],
        putZone: { [underlying]: preset.putZones[$("putZonePreset").value] || preset.putZones.normal },
        callZone: { [underlying]: preset.callZones[$("callZonePreset").value] || preset.callZones.normal },
        putDeltaMax: selectedPutDelta.length ? Math.max(...selectedPutDelta) : 0.35,
        callDeltaMax: selectedCallDelta.length ? Math.max(...selectedCallDelta) : 0.20,
        putInventoryDte: inventoryDte.put,
        callInventoryDte: inventoryDte.call,
        selectedNewDtes,
        creditSource: $("creditSource").value,
        candidateLimit: Math.max(numIn("candidateLimit", 80), 10),
        multiplier: Object.fromEntries(Object.entries(PRODUCT_PRESETS).map(([key, value]) => [key, value.multiplier])),
        spotFallback: preset.spotFallback,
        weights: { distribution: 0.35, income: 0.25, risk: 0.30, target: 0.10 }
      };
    }

    function parseZones(raw) {
      const out = {};
      String(raw || "").split(";").forEach(part => {
        const [root, range] = part.split(":");
        if (!root || !range) return;
        const [lo, hi] = parseRange(range, [NaN, NaN]);
        if (Number.isFinite(lo) && Number.isFinite(hi)) out[root.trim().toUpperCase()] = [Math.min(lo, hi), Math.max(lo, hi)];
      });
      return out;
    }

    function parseRange(raw, fallback) {
      const match = String(raw || "").match(/(-?\d+(?:\.\d+)?)\s*[-,~到]\s*(-?\d+(?:\.\d+)?)/);
      return match ? [Number(match[1]), Number(match[2])] : fallback;
    }

    function numIn(id, fallback) {
      const value = toNum($(id).value);
      return Number.isFinite(value) ? value : fallback;
    }

    function render() {
      try {
        syncFilterChoices();
        const cfg = config();
        shortPositions = parseShortPositions(positionRows, cfg);
        futurePositions = parseFuturePositions(positionRows, cfg);
        const inventory = aggregateInventory(shortPositions);
        const pressure = targetPressure(shortPositions, cfg);
        candidates = scanCandidates(chainRows, shortPositions, cfg, pressure, inventory).slice(0, cfg.candidateLimit);
        renderTargetSummary(pressure, shortPositions);
        renderInventory(inventory, futurePositions, cfg);
        renderPriceChart(cfg, futurePositions);
        renderInventoryChain(shortPositions, candidates, cfg);
        renderCandidates(candidates, cfg);
        renderBeforeAfter(shortPositions, candidates, cfg);
        renderNodes(shortPositions, candidates, cfg);
        setError("");
      } catch (error) {
        setError(error.message || String(error));
      }
    }

    function syncFilterChoices() {
      const underlying = $("activeUnderlying").value || "ZF";
      renderChoiceBox("putDeltaChoices", DELTA_THRESHOLDS, [0.35], value => value.toFixed(2));
      renderChoiceBox("callDeltaChoices", DELTA_THRESHOLDS, [0.20], value => value.toFixed(2));
      const axis = expiryAxisFromChain(chainRows, { underlying });
      const dtes = axis.map(axisKeyToNumber).filter(Number.isFinite);
      const defaults = dtes.filter(dte => dte >= 0 && dte <= 7);
      renderChoiceBox("newDteChoices", dtes, defaults.length ? defaults : dtes.slice(0, 6), value => `${value}DTE`);
    }

    function renderChoiceBox(id, values, defaultValues, labelFn) {
      const box = $(id);
      const existing = checkedNumbers(id);
      const selected = new Set((existing.length ? existing : defaultValues).map(String));
      const currentValues = Array.from(box.querySelectorAll ? box.querySelectorAll("input[type=checkbox]") : []).map(input => input.value).join(",");
      const nextValues = values.join(",");
      if (currentValues === nextValues) return;
      box.innerHTML = values.map(value => {
        const checked = selected.has(String(value)) ? " checked" : "";
        return `<label><input type="checkbox" value="${esc(value)}"${checked}>${esc(labelFn(value))}</label>`;
      }).join("");
    }

    function checkedNumbers(id) {
      return Array.from($(id).querySelectorAll ? $(id).querySelectorAll("input[type=checkbox]:checked") : [])
        .map(input => toNum(input.value))
        .filter(Number.isFinite);
    }

    function axisKeyToNumber(key) {
      const match = txt(key).match(/^(\d+)DTE/);
      return match ? Number(match[1]) : NaN;
    }

    function parseShortPositions(rows, cfg) {
      const allowed = new Set(cfg.allowed);
      return rows.map(row => {
        const position = toNum(row.position);
        const right = normRight(row.right || row.direction);
        const underlying = productOf(row);
        const dte = dteFromRow(row);
        if (!Number.isFinite(position) || position >= 0) return null;
        if (right !== "P" && right !== "C") return null;
        if (row.secType && !["FOP", "OPT"].includes(String(row.secType).toUpperCase())) return null;
        if (allowed.size && !allowed.has(underlying)) return null;
        if (right === "P" && !(dte >= cfg.putInventoryDte[0] && dte <= cfg.putInventoryDte[1])) return null;
        if (right === "C" && !(dte >= cfg.callInventoryDte[0] && dte <= cfg.callInventoryDte[1])) return null;
        const multiplier = multiplierFor(row, underlying, cfg);
        const marketValue = toNum(row.marketValue);
        const bid = firstNum(row.bid);
        const ask = firstNum(row.ask);
        let mid = firstNum(row.mid, row.price, row.last, row.markPrice, row.modelOptionPrice);
        if (!Number.isFinite(mid) && Number.isFinite(bid) && Number.isFinite(ask)) mid = (bid + ask) / 2;
        const price = firstNum(mid, bid, ask, 0);
        return {
          underlying,
          expiry: txt(row.expiry || row.expiration || row.lastTradeDateOrContractMonth),
          dte,
          bucket: dteLabel(dte),
          dateBand: dateBandFor(row.expiry || row.expiration || row.lastTradeDateOrContractMonth, dte),
          right,
          strike: toNum(row.strike),
          position,
          contracts: Math.abs(position),
          marketValue,
          remainingPremium: Number.isFinite(marketValue) && marketValue < 0 ? -marketValue : Math.abs(position * price * multiplier),
          unrealizedPnL: firstNum(row.unrealizedPnL, 0),
          underlyingPrice: firstNum(row.underlyingPrice, row.undPrice, row.referencePrice),
          bid,
          ask,
          mid,
          delta: signedDelta(row, right),
          gamma: firstNum(row.gamma, row.modelGreeks_gamma, 0),
          theta: firstNum(row.theta, row.modelGreeks_theta, 0),
          vega: firstNum(row.vega, row.modelGreeks_vega, 0),
          multiplier,
          localSymbol: txt(row.localSymbol),
          node: `${underlying}-${right}-${num(toNum(row.strike), 3)}`
        };
      }).filter(Boolean);
    }

    function parseFuturePositions(rows, cfg) {
      return rows.map(row => {
        const underlying = productOf(row);
        const position = toNum(row.position);
        const secType = txt(row.secType).toUpperCase();
        if (underlying !== cfg.underlying || !Number.isFinite(position)) return null;
        if (secType && secType !== "FUT") return null;
        if (!secType && normRight(row.right || row.direction)) return null;
        return {
          underlying,
          position,
          localSymbol: txt(row.localSymbol),
          marketValue: toNum(row.marketValue),
          price: firstNum(row.underlyingPrice, row.undPrice, row.futurePrice, row.futuresPrice, row.marketPrice, Math.abs(toNum(row.marketValue)) / Math.max(Math.abs(position) * multiplierFor(row, underlying, cfg), EPS)),
          delta: firstNum(row.delta, 1),
          multiplier: multiplierFor(row, underlying, cfg)
        };
      }).filter(Boolean);
    }

    function aggregateInventory(positions) {
      const totalPremium = sum(positions, "remainingPremium");
      const totalGamma = positions.reduce((acc, row) => acc + Math.abs(row.position * row.gamma), 0);
      const totalTheta = positions.reduce((acc, row) => acc + Math.abs(row.position * row.theta), 0);
      return {
        totalContracts: sum(positions, "contracts"),
        remainingPremium: totalPremium,
        unrealizedPnL: sum(positions, "unrealizedPnL"),
        deltaExposure: positions.reduce((acc, row) => acc + row.position * row.delta, 0),
        gammaExposure: positions.reduce((acc, row) => acc + row.position * row.gamma, 0),
        thetaExposure: positions.reduce((acc, row) => acc + row.position * row.theta, 0),
        vegaExposure: positions.reduce((acc, row) => acc + row.position * row.vega, 0),
        byUnderlying: groupInventory(positions, row => row.underlying, totalPremium, totalGamma, totalTheta),
        bySide: groupInventory(positions, row => row.right, totalPremium, totalGamma, totalTheta),
        byDte: groupInventory(positions, row => row.bucket, totalPremium, totalGamma, totalTheta, dteGroupSort),
        byDateBand: groupInventory(positions, row => row.dateBand, totalPremium, totalGamma, totalTheta, dateBandGroupSort),
        byExpiry: groupInventory(positions, row => dteLabel(row.dte), totalPremium, totalGamma, totalTheta, dteGroupSort),
        byNode: groupInventory(positions, row => row.node, totalPremium, totalGamma, totalTheta)
      };
    }

    function groupInventory(rows, keyFn, totalPremium, totalGamma, totalTheta, sortFn) {
      const groups = new Map();
      rows.forEach(row => {
        const key = keyFn(row) || "-";
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(row);
      });
      const grouped = Array.from(groups.entries()).map(([key, items]) => {
        const premium = sum(items, "remainingPremium");
        const gammaAbs = items.reduce((acc, row) => acc + Math.abs(row.position * row.gamma), 0);
        const thetaAbs = items.reduce((acc, row) => acc + Math.abs(row.position * row.theta), 0);
        return {
          key,
          contracts: sum(items, "contracts"),
          remainingPremium: premium,
          deltaExposure: items.reduce((acc, row) => acc + row.position * row.delta, 0),
          gammaExposure: items.reduce((acc, row) => acc + row.position * row.gamma, 0),
          thetaExposure: items.reduce((acc, row) => acc + row.position * row.theta, 0),
          vegaExposure: items.reduce((acc, row) => acc + row.position * row.vega, 0),
          premiumWeight: premium / Math.max(totalPremium, EPS),
          gammaWeight: gammaAbs / Math.max(totalGamma, EPS),
          thetaWeight: thetaAbs / Math.max(totalTheta, EPS)
        };
      });
      return grouped.sort(sortFn || ((a, b) => b.remainingPremium - a.remainingPremium));
    }

    function targetPressure(positions, cfg) {
      const monthlyTargetProfit = cfg.capital * cfg.targetReturn;
      const completedProfit = cfg.realizedPnl;
      const remainingTarget = Math.max(monthlyTargetProfit - completedProfit, 0);
      const dailyTargetReference = remainingTarget / Math.max(cfg.remainingDays, 1);
      const currentShortRemainingPremium = sum(positions, "remainingPremium");
      const ratio = remainingTarget / Math.max(currentShortRemainingPremium, EPS);
      const label = ratio < 0.5 ? "LOW" : ratio <= 1 ? "NORMAL" : ratio <= 1.5 ? "ELEVATED" : "HIGH";
      return { monthlyTargetProfit, completedProfit, remainingTarget, dailyTargetReference, currentShortRemainingPremium, ratio, label };
    }

    function scanCandidates(rows, positions, cfg, pressure, inventory) {
      const allowed = new Set(cfg.allowed);
      return rows.map((row, index) => {
        const underlying = productOf(row);
        const right = normRight(row.right || row.direction);
        const dte = dteFromRow(row);
        const strike = toNum(row.strike);
        if (allowed.size && !allowed.has(underlying)) return null;
        if (right !== "P" && right !== "C") return null;
        if (cfg.selectedNewDtes.length && !cfg.selectedNewDtes.includes(Math.max(0, Math.round(dte)))) return null;
        if (!Number.isFinite(strike)) return null;
        if (right === "P" && !strikeAllowed(strike, cfg.putZone[underlying], "P")) return null;
        if (right === "C" && !strikeAllowed(strike, cfg.callZone[underlying], "C")) return null;
        const delta = signedDelta(row, right);
        const absDelta = Math.abs(delta);
        const maxDelta = right === "P" ? cfg.putDeltaMax : cfg.callDeltaMax;
        if (!(absDelta > 0 && absDelta <= maxDelta)) return null;
        const bid = firstNum(row.bid);
        const ask = firstNum(row.ask);
        let mid = firstNum(row.mid, row.price, row.last, row.modelOptionPrice, row.optPrice);
        if (!Number.isFinite(mid) && Number.isFinite(bid) && Number.isFinite(ask)) mid = (bid + ask) / 2;
        const estimatedCredit = cfg.creditSource === "bid" && Number.isFinite(bid) ? bid : mid;
        if (!Number.isFinite(estimatedCredit) || estimatedCredit <= 0) return null;
        const multiplier = multiplierFor(row, underlying, cfg);
        const expiry = txt(row.expiry || row.expiration || row.lastTradeDateOrContractMonth);
        const bucket = dteLabel(dte);
        const dateBand = dateBandFor(expiry, dte);
        const node = `${underlying}-${right}-${num(strike, 3)}`;
        const gamma = firstNum(row.gamma, row.modelGreeks_gamma, row.bidGreeks_gamma, row.askGreeks_gamma, 0);
        const theta = firstNum(row.theta, row.modelGreeks_theta, row.bidGreeks_theta, row.askGreeks_theta, 0);
        const vega = firstNum(row.vega, row.modelGreeks_vega, row.bidGreeks_vega, row.askGreeks_vega, 0);
        const spread = Math.max((Number.isFinite(ask) ? ask : estimatedCredit) - (Number.isFinite(bid) ? bid : estimatedCredit), 0);
        const incomeScore = estimatedCredit * captureRate(bucket) * multiplier;
        const distributionScore = distributionScoreFor(inventory, right, bucket, node);
        const marginEstimate = firstNum(row.marginEstimate, estimatedCredit * multiplier * 6);
        const riskScore = absDelta * 12 + Math.abs(gamma) * 8 + Math.abs(vega) + marginEstimate * 0.001 + spread * 10;
        const targetFitScore = Math.min(estimatedCredit * multiplier / Math.max(pressure.dailyTargetReference, EPS), 3);
        const finalScore = incomeScore * cfg.weights.income + distributionScore * cfg.weights.distribution + targetFitScore * 100 * cfg.weights.target - riskScore * cfg.weights.risk;
        const id = txt(row.conId) || `${underlying}-${right}-${strike}-${dte}-${index}`;
        return {
          id, underlying, expiry, dte, bucket, dateBand,
          right, strike, bid, ask, mid, estimatedCredit, delta, gamma, theta, vega,
          localSymbol: txt(row.localSymbol),
          volume: firstNum(row.volume, row.rawVolume, row.callVolume, row.putVolume, 0),
          openInterest: firstNum(row.openInterest, row.rawOpenInterest, row.callOpenInterest, row.putOpenInterest, 0),
          marginEstimate, spread, incomeScore, distributionScore, riskScore, targetFitScore, finalScore,
          node,
          warnings: warningsFor(inventory, right, bucket, node, distributionScore)
        };
      }).filter(Boolean).sort((a, b) => b.finalScore - a.finalScore);
    }

    function distributionScoreFor(inventory, right, bucket, node) {
      const dteW = weightFor(inventory.byDte, bucket, "premiumWeight");
      const sideW = weightFor(inventory.bySide, right, "premiumWeight");
      const nodeW = weightFor(inventory.byNode, node, "premiumWeight");
      return (dteW < 0.15 ? 40 : dteW > 0.35 ? -40 : 5)
        + (nodeW < 0.10 ? 25 : nodeW > 0.25 ? -35 : 5)
        + (sideW < 0.35 ? 20 : sideW > 0.70 ? -20 : 5);
    }

    function warningsFor(inventory, right, bucket, node, score) {
      const warnings = [];
      if (weightFor(inventory.byNode, node, "premiumWeight") > 0.25) warnings.push("该节点正在变得集中");
      if (weightFor(inventory.byNode, node, "gammaWeight") > 0.35) warnings.push("该节点主导 Gamma 暴露");
      if (weightFor(inventory.byDte, bucket, "premiumWeight") > 0.35) warnings.push("加入这里会增加 DTE 集中度");
      if (weightFor(inventory.bySide, right, "premiumWeight") > 0.70) warnings.push("加入这里会增加方向集中度");
      if (score > 40) warnings.push("加入这里有助于改善分布平衡");
      return warnings;
    }

    function renderTargetSummary(pressure, positions) {
      const tone = pressure.label === "HIGH" ? "red" : pressure.label === "ELEVATED" ? "amber" : "green";
      $("targetSummary").innerHTML = [
        metric("本月目标", money(pressure.monthlyTargetProfit), "目标仅作压力参考", "blue"),
        metric("本月已完成", money(pressure.completedProfit), "来自输入的已实现PnL", pressure.completedProfit >= pressure.monthlyTargetProfit ? "green" : "cyan"),
        metric("还需完成", money(pressure.remainingTarget), "不强制补卖", tone),
        metric("日均参考", money(pressure.dailyTargetReference), `${$("remainingDays").value} 个交易日`, "cyan"),
        metric("卖方剩余权利金", money(pressure.currentShortRemainingPremium), "只统计短期期权", "violet"),
        metric("目标压力", pressure.label, `压力比 ${num(pressure.ratio, 2)}`, tone)
      ].join("");
    }

    function renderInventory(inventory, futures, cfg) {
      const expiryRows = expiryExposureRows(shortPositions, chainRows, cfg);
      $("inventoryBars").innerHTML = [
        bars("按品种", inventory.byUnderlying),
        bars("按方向", inventory.bySide),
        bars("按到期", expiryRows, { showZero: true }),
        bars("按行权节点", inventory.byNode.slice(0, 10))
      ].join("");
      const futuresQty = futures.reduce((acc, row) => acc + row.position, 0);
      const futuresText = futures.length
        ? futures.map(row => `${row.localSymbol || row.underlying} ${num(row.position, 0)}`).join(" / ")
        : "未识别到当前品种期货";
      $("greekSummary").innerHTML = [
        metric("合约张数", num(inventory.totalContracts, 0), "只统计卖方库存", "blue"),
        metric("期货张数", num(futuresQty, 0), futuresText, "cyan"),
        metric("Delta", num(inventory.deltaExposure, 2), "净暴露", "cyan"),
        metric("Gamma", num(inventory.gammaExposure, 2), "净暴露", "amber"),
        metric("Theta", num(inventory.thetaExposure, 2), "净暴露", "green")
      ].join("");
      renderFuturePricePrompt(cfg, futures);
      renderGreekDte(expiryRows);
    }

    function renderGreekDte(rows) {
      renderTable("greekDteTable", rows, ["key", "contracts", "deltaExposure", "gammaExposure", "thetaExposure", "vegaExposure", "remainingPremium"], {
        key: "DTE分组", contracts: "张数", deltaExposure: "Delta", gammaExposure: "Gamma", thetaExposure: "Theta", vegaExposure: "Vega", remainingPremium: "剩余权利金"
      });
    }

    function renderFuturePricePrompt(cfg, futures) {
      const ref = referencePriceFor(cfg.underlying, chainRows, shortPositions, cfg, futures);
      const status = Number.isFinite(ref.price)
        ? `当前期货价 ${num(ref.price, 3)}（${ref.source || "自动"}）`
        : "未识别到当前期货价";
      $("futurePricePrompt").innerHTML = `
        <div class="note">${esc(status)}；右侧输入会覆盖自动识别值。</div>
        <label>手动期货价<input id="manualFuturePricePanel" type="number" value="${Number.isFinite(cfg.manualFuturePrice) ? cfg.manualFuturePrice : ""}" step="0.001" placeholder="例如 107.000" /></label>
      `;
      const input = $("manualFuturePricePanel");
      input.addEventListener("input", () => {
        $("manualFuturePrice").value = input.value;
        render();
      });
    }

    function expiryExposureRows(positions, chain, cfg) {
      const totalPremium = sum(positions, "remainingPremium");
      const totalGamma = positions.reduce((acc, row) => acc + Math.abs(row.position * row.gamma), 0);
      const totalTheta = positions.reduce((acc, row) => acc + Math.abs(row.position * row.theta), 0);
      const buckets = new Map();
      const axis = expiryAxisFromChain(chain, cfg);
      axis.forEach(key => buckets.set(key, []));
      positions.forEach(row => {
        const key = bucketForExpiryAxis(row.dte, axis);
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(row);
      });
      return Array.from(buckets.entries()).map(([key, items]) => {
        const premium = sum(items, "remainingPremium");
        const gammaAbs = items.reduce((acc, row) => acc + Math.abs(row.position * row.gamma), 0);
        const thetaAbs = items.reduce((acc, row) => acc + Math.abs(row.position * row.theta), 0);
        return {
          key,
          contracts: sum(items, "contracts"),
          remainingPremium: premium,
          deltaExposure: items.reduce((acc, row) => acc + row.position * row.delta, 0),
          gammaExposure: items.reduce((acc, row) => acc + row.position * row.gamma, 0),
          thetaExposure: items.reduce((acc, row) => acc + row.position * row.theta, 0),
          vegaExposure: items.reduce((acc, row) => acc + row.position * row.vega, 0),
          premiumWeight: premium / Math.max(totalPremium, EPS),
          gammaWeight: gammaAbs / Math.max(totalGamma, EPS),
          thetaWeight: thetaAbs / Math.max(totalTheta, EPS)
        };
      });
    }

    function expiryAxisFromChain(chain, cfg) {
      const dtes = Array.from(new Set(chain
        .filter(row => productOf(row) === cfg.underlying)
        .map(row => dteFromRow(row))
        .filter(Number.isFinite)
        .map(dte => Math.max(0, Math.round(dte)))))
        .sort((a, b) => a - b);
      if (!dtes.length) {
        const positionDtes = Array.from(new Set(shortPositions.map(row => Math.max(0, Math.round(row.dte))).filter(Number.isFinite))).sort((a, b) => a - b);
        return positionDtes.length ? positionDtes.map(dteLabel) : ["0DTE"];
      }
      const near = dtes.filter(dte => dte < 15).map(dteLabel);
      const far = dtes.filter(dte => dte >= 15);
      if (far.length) near.push(`${far[0]}DTE+`);
      return near;
    }

    function bucketForExpiryAxis(dte, axis) {
      const rounded = Math.max(0, Math.round(dte));
      const exact = dteLabel(rounded);
      if (axis.includes(exact)) return exact;
      const plus = axis.find(key => key.endsWith("DTE+") && rounded >= Number(key.replace("DTE+", "")));
      return plus || exact;
    }

    function renderPriceChart(cfg, futures) {
      const canvas = $("priceChart");
      const note = $("priceChartNote");
      const ctx = canvas.getContext && canvas.getContext("2d");
      if (!ctx) return;
      const rect = canvas.getBoundingClientRect ? canvas.getBoundingClientRect() : { width: 900, height: 240 };
      const scale = (typeof window !== "undefined" && window.devicePixelRatio) || 1;
      const width = Math.max(Math.floor(rect.width || 900), 320);
      const height = Math.max(Math.floor(rect.height || 240), 180);
      canvas.width = Math.floor(width * scale);
      canvas.height = Math.floor(height * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.clearRect(0, 0, width, height);
      const rows = barsRows
        .filter(row => productOf(row) === cfg.underlying || txt(row.symbol).toUpperCase() === cfg.underlying)
        .map(parseBarRow)
        .filter(row => Number.isFinite(row.time) && Number.isFinite(row.open) && Number.isFinite(row.high) && Number.isFinite(row.low) && Number.isFinite(row.close))
        .sort((a, b) => a.time - b.time)
        .slice(-80);
      if (!rows.length) {
        const priceRows = futurePriceSeries(cfg.underlying);
        if (priceRows.length) {
          note.textContent = `${cfg.underlying} 本地期货价 · 来自 clean_verify future_prices · ${priceRows.length} 个合约/报价`;
          drawPriceLine(ctx, priceRows, width, height);
          return;
        }
        note.textContent = `暂无 ${cfg.underlying} K线数据，也未找到 future_prices。可上传K线CSV/JSON，或让同步脚本输出 ${DEFAULT_BARS_PATH}。`;
        ctx.fillStyle = "#667085";
        ctx.font = "13px Segoe UI, Arial";
        ctx.fillText("暂无K线或本地期货价数据", 16, 34);
        return;
      }
      note.textContent = `${cfg.underlying} K线 · ${rows[0].label} 至 ${rows[rows.length - 1].label} · ${rows.length} bars`;
      const pad = { left: 48, right: 16, top: 16, bottom: 24 };
      const min = Math.min(...rows.map(row => row.low));
      const max = Math.max(...rows.map(row => row.high));
      const span = Math.max(max - min, EPS);
      const xStep = (width - pad.left - pad.right) / Math.max(rows.length, 1);
      const y = value => pad.top + (max - value) / span * (height - pad.top - pad.bottom);
      ctx.strokeStyle = "#d0d7e2";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const yy = pad.top + i * (height - pad.top - pad.bottom) / 3;
        ctx.moveTo(pad.left, yy);
        ctx.lineTo(width - pad.right, yy);
      }
      ctx.stroke();
      ctx.fillStyle = "#667085";
      ctx.font = "11px Segoe UI, Arial";
      for (let i = 0; i < 4; i++) {
        const value = max - i * span / 3;
        ctx.fillText(num(value, 3), 6, pad.top + i * (height - pad.top - pad.bottom) / 3 + 4);
      }
      rows.forEach((row, index) => {
        const x = pad.left + index * xStep + xStep / 2;
        const up = row.close >= row.open;
        ctx.strokeStyle = up ? "#087443" : "#b42318";
        ctx.fillStyle = up ? "#dcfae6" : "#fee4e2";
        ctx.beginPath();
        ctx.moveTo(x, y(row.high));
        ctx.lineTo(x, y(row.low));
        ctx.stroke();
        const bodyTop = y(Math.max(row.open, row.close));
        const bodyBottom = y(Math.min(row.open, row.close));
        const bodyWidth = Math.max(Math.min(xStep * 0.62, 9), 3);
        ctx.fillRect(x - bodyWidth / 2, bodyTop, bodyWidth, Math.max(bodyBottom - bodyTop, 1));
        ctx.strokeRect(x - bodyWidth / 2, bodyTop, bodyWidth, Math.max(bodyBottom - bodyTop, 1));
      });
    }

    function futurePriceSeries(underlying) {
      return futurePriceRows
        .filter(row => txt(row.root || row.symbol).toUpperCase() === underlying)
        .map((row, index) => ({
          label: txt(row.localSymbol || row.month || `${underlying}-${index + 1}`),
          close: firstNum(row.price, row.marketPrice, row.mid, row.last, row.close, row.bid, row.ask)
        }))
        .filter(row => Number.isFinite(row.close));
    }

    function drawPriceLine(ctx, rows, width, height) {
      const pad = { left: 48, right: 18, top: 18, bottom: 28 };
      const min = Math.min(...rows.map(row => row.close));
      const max = Math.max(...rows.map(row => row.close));
      const span = Math.max(max - min, 0.01);
      const y = value => pad.top + (max - value) / span * (height - pad.top - pad.bottom);
      const x = index => rows.length === 1
        ? pad.left + (width - pad.left - pad.right) / 2
        : pad.left + index * (width - pad.left - pad.right) / (rows.length - 1);
      ctx.strokeStyle = "#d0d7e2";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const yy = pad.top + i * (height - pad.top - pad.bottom) / 3;
        ctx.moveTo(pad.left, yy);
        ctx.lineTo(width - pad.right, yy);
      }
      ctx.stroke();
      ctx.fillStyle = "#667085";
      ctx.font = "11px Segoe UI, Arial";
      for (let i = 0; i < 4; i++) {
        const value = max - i * span / 3;
        ctx.fillText(num(value, 3), 6, pad.top + i * (height - pad.top - pad.bottom) / 3 + 4);
      }
      ctx.strokeStyle = "#155eef";
      ctx.lineWidth = 2;
      ctx.beginPath();
      rows.forEach((row, index) => {
        const xx = x(index), yy = y(row.close);
        if (index === 0) ctx.moveTo(xx, yy);
        else ctx.lineTo(xx, yy);
      });
      ctx.stroke();
      rows.forEach((row, index) => {
        const xx = x(index), yy = y(row.close);
        ctx.fillStyle = "#155eef";
        ctx.beginPath();
        ctx.arc(xx, yy, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#344054";
        ctx.fillText(row.label, xx - 18, height - 8);
        ctx.fillText(num(row.close, 3), xx - 20, yy - 8);
      });
    }

    function parseBarRow(row) {
      const date = new Date(txt(row.dateChina || row.date || row.datetime || row.time || row.timestamp));
      return {
        time: date.getTime(),
        label: Number.isFinite(date.getTime()) ? `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}` : "",
        open: firstNum(row.open),
        high: firstNum(row.high),
        low: firstNum(row.low),
        close: firstNum(row.close),
        symbol: txt(row.symbol)
      };
    }

    function bars(title, rows, options = {}) {
      if (!rows.length) return `<h3>${esc(title)}</h3><div class="note">暂无卖方库存</div>`;
      return `<h3>${esc(title)}</h3>` + rows.map(row => (
        `<div class="bar-row"><span>${esc(row.key)}</span><div class="bar"><span style="width:${row.remainingPremium > 0 ? clamp(row.premiumWeight * 100, 1, 100) : 0}%"></span></div><span>${options.showZero || row.remainingPremium ? money(row.remainingPremium) : ""}</span></div>`
      )).join("");
    }

    function renderCandidates(rows, cfg) {
      $("candidateNote").textContent = `当前品种 ${cfg.underlying}；按到期日展开为期权链，左 Call / 中 Strike / 右 Put。单元格里输入数量，右侧立即更新组合变化。`;
      $("candidateTable").innerHTML = optionChainHtml(rows, cfg, { editable: true, showGreeks: true, futures: futurePositions });
      $("candidateTable").querySelectorAll("input[data-id]").forEach(input => {
        input.addEventListener("input", () => {
          proposed[input.dataset.id] = Math.max(toNum(input.value), 0) || 0;
          renderBeforeAfter(shortPositions, candidates, config());
          renderNodes(shortPositions, candidates, config());
        });
      });
    }

    function renderInventoryChain(positions, candidateRows, cfg) {
      const inventoryRows = positions.map(row => ({
        ...row,
        id: `inventory-${row.node}-${row.expiry}`,
        estimatedCredit: row.remainingPremium / Math.max(row.contracts * row.multiplier, EPS),
        bid: NaN,
        ask: NaN,
        mid: NaN,
        finalScore: 0
      }));
      const ref = referencePriceFor(cfg.underlying, chainRows, shortPositions, cfg, futurePositions);
      $("inventoryChainNote").textContent = Number.isFinite(ref.price)
        ? `当前品种 ${cfg.underlying}；绿色行是当前期货价位置。`
        : `当前品种 ${cfg.underlying}；未识别到当前期货价，可在上方“当前期货价”手动输入。`;
      $("inventoryChain").innerHTML = optionChainHtml(inventoryRows, cfg, { editable: false, showGreeks: false, futures: futurePositions });
    }

    function optionChainHtml(rows, cfg, options) {
      const productRows = rows.filter(row => row.underlying === cfg.underlying);
      if (!productRows.length) return `<div class="note">当前品种暂无可展示期权链。</div>`;
      const ref = referencePriceFor(cfg.underlying, chainRows, shortPositions, cfg, options.futures || []);
      const spot = ref.price;
      const expiries = Array.from(new Set(productRows.map(row => row.expiry || "-"))).sort((a, b) => expirySortKey(a) - expirySortKey(b));
      return expiries.map(expiry => {
        const expiryRows = productRows.filter(row => (row.expiry || "-") === expiry);
        const strikes = Array.from(new Set(expiryRows.map(row => row.strike).filter(Number.isFinite))).sort((a, b) => b - a);
        const head = options.editable
          ? `<tr><th class="call">Call</th><th class="call">Bid/Ask</th><th class="call">Mid</th><th class="call">Δ/Γ</th><th class="call">分</th><th class="call">数量</th><th class="strike">Strike</th><th class="put">数量</th><th class="put">分</th><th class="put">Δ/Γ</th><th class="put">Mid</th><th class="put">Bid/Ask</th><th class="put">Put</th></tr>`
          : `<tr><th class="call">Call</th><th class="call">市值</th><th class="call">未实现</th><th class="call">Bid/Ask</th><th class="call">Delta</th><th class="strike">Strike</th><th class="put">Delta</th><th class="put">Bid/Ask</th><th class="put">未实现</th><th class="put">市值</th><th class="put">Put</th></tr>`;
        const colspan = options.editable ? 13 : 11;
        const body = [];
        let insertedSpot = false;
        strikes.forEach((strike, index) => {
          if (!insertedSpot && Number.isFinite(spot) && index > 0 && spot <= strikes[index - 1] && spot >= strike) {
            body.push(`<tr class="spot-row"><td colspan="${colspan}">当前期货价 ${num(spot, 3)}</td></tr>`);
            insertedSpot = true;
          }
          const calls = expiryRows.filter(row => row.right === "C" && row.strike === strike).sort((a, b) => b.finalScore - a.finalScore);
          const puts = expiryRows.filter(row => row.right === "P" && row.strike === strike).sort((a, b) => b.finalScore - a.finalScore);
          const call = calls[0];
          const put = puts[0];
          body.push(options.editable
            ? `<tr>${chainCandidateCells(call, "call")}<td class="strike"><span class="strike-meta">${esc(expiryRows[0] ? expiryRows[0].bucket : "")}</span><span class="strike-value">${num(strike, 3)}</span></td>${chainCandidateCells(put, "put")}</tr>`
            : `<tr>${chainReadonlyCells(call, "call")}<td class="strike"><span class="strike-meta">${esc(expiryRows[0] ? expiryRows[0].bucket : "")}</span><span class="strike-value">${num(strike, 3)}</span></td>${chainReadonlyCells(put, "put")}</tr>`);
        });
        if (!insertedSpot && Number.isFinite(spot)) body.push(`<tr class="spot-row"><td colspan="${colspan}">当前期货价 ${num(spot, 3)}</td></tr>`);
        return `<div class="chain-expiry">${esc(expiryRows[0] ? expiryRows[0].bucket : expiryLabelFromExpiry(expiry))} · ${strikes.length} strikes</div><div class="table-wrap"><table><thead>${head}</thead><tbody>${body.join("")}</tbody></table></div>`;
      }).join("");
    }

    function chainReadonlyCells(row, side) {
      const blank = side === "call"
        ? `<td class="${side}">-</td><td class="${side}">-</td><td class="${side}">-</td><td class="${side}">-</td><td class="${side}">-</td>`
        : `<td class="${side}">-</td><td class="${side}">-</td><td class="${side}">-</td><td class="${side}">-</td><td class="${side}">-</td>`;
      if (!row) return blank;
      const name = `${num(Math.abs(row.position || 0), 0)}张 ${esc(row.localSymbol || "")}`;
      const cells = [
        name,
        money(row.marketValue),
        money(row.unrealizedPnL),
        `${optPx(row.bid)} / ${optPx(row.ask)}`,
        num(row.delta, 2)
      ];
      const ordered = side === "call" ? cells : [cells[4], cells[3], cells[2], cells[1], cells[0]];
      return ordered.map(value => `<td class="${side}">${value}</td>`).join("");
    }

    function chainCandidateCells(row, side) {
      if (!row) return Array.from({ length: 6 }, () => `<td class="${side}">-</td>`).join("");
      const qty = proposed[row.id] || 0;
      const qtyInput = `<input class="qty" data-id="${esc(row.id)}" type="number" min="0" step="1" value="${qty}" />`;
      const name = esc(row.localSymbol || `${row.underlying} ${row.right}${num(row.strike, 3)}`);
      const cells = [
        name,
        `${optPx(row.bid)} / ${optPx(row.ask)}`,
        optPx(row.estimatedCredit),
        `${num(row.delta, 2)} / ${num(row.gamma, 2)}`,
        num(row.finalScore, 1),
        qtyInput
      ];
      const ordered = side === "call" ? cells : [cells[5], cells[4], cells[3], cells[2], cells[1], cells[0]];
      return ordered.map(value => `<td class="${side}">${value}</td>`).join("");
    }

    function renderHeatmapCards(id, rows) {
      const metric = $("heatMetric").value;
      const values = rows.map(row => heatValue(row, metric)).filter(Number.isFinite);
      const max = Math.max(...values, 1);
      const min = Math.min(...values, 0);
      return rows.slice(0, 80).map(row => {
        const value = heatValue(row, metric);
        const pct = (value - min) / Math.max(max - min, EPS);
        const color = `rgba(${Math.round(28 + pct * 20)}, ${Math.round(84 + pct * 88)}, ${Math.round(160 - pct * 80)}, ${0.15 + pct * 0.55})`;
        return `<div class="heat-cell" style="background:${color}"><strong>${esc(row.underlying)} ${esc(row.right)} ${num(row.strike, 3)}</strong><span>${esc(row.bucket)} / ${esc(row.expiry)}</span><span>${metricLabel(metric)} ${num(value, 2)}</span><span>综合 ${num(row.finalScore, 1)}</span></div>`;
      }).join("") || `<div class="note">暂无候选</div>`;
    }

    function heatValue(row, metric) {
      if (metric === "estimatedCredit") return row.estimatedCredit;
      if (metric === "gamma") return Math.abs(row.gamma);
      if (metric === "distributionScore") return row.distributionScore;
      return row.finalScore;
    }

    function renderBeforeAfter(positions, rows, cfg) {
      const before = exposureFromPositions(positions);
      const added = exposureFromCandidates(rows, cfg);
      const after = Object.fromEntries(Object.keys(before).map(key => [key, before[key] + added[key]]));
      const tableRows = [
        { label: "当前", ...before },
        { label: "新增", ...added },
        { label: "调整后", ...after }
      ];
      renderTable("beforeAfter", tableRows, ["label", "premium", "netDelta", "netGamma", "netTheta", "netVega", "margin"], {
        label: "状态", premium: "剩余/新增权利金", netDelta: "净Delta", netGamma: "净Gamma", netTheta: "净Theta", netVega: "净Vega", margin: "估算保证金"
      });
      renderSelectedOptions(rows);
      renderAfterDte(positions, rows, cfg);
    }

    function exposureFromPositions(positions) {
      return {
        premium: sum(positions, "remainingPremium"),
        netDelta: positions.reduce((acc, row) => acc + row.position * row.delta, 0),
        netGamma: positions.reduce((acc, row) => acc + row.position * row.gamma, 0),
        netTheta: positions.reduce((acc, row) => acc + row.position * row.theta, 0),
        netVega: positions.reduce((acc, row) => acc + row.position * row.vega, 0),
        margin: 0
      };
    }

    function exposureFromCandidates(rows, cfg) {
      return rows.reduce((acc, row) => {
        const qty = toNum(proposed[row.id]);
        if (!(qty > 0)) return acc;
        const multiplier = cfg.multiplier[row.underlying] || 1000;
        acc.premium += qty * row.estimatedCredit * multiplier;
        acc.netDelta += -qty * row.delta;
        acc.netGamma += -qty * row.gamma;
        acc.netTheta += -qty * row.theta;
        acc.netVega += -qty * row.vega;
        acc.margin += qty * row.marginEstimate;
        return acc;
      }, { premium: 0, netDelta: 0, netGamma: 0, netTheta: 0, netVega: 0, margin: 0 });
    }

    function selectedCandidateRows(rows) {
      return rows.filter(row => toNum(proposed[row.id]) > 0).map(row => ({ ...row, proposedQuantity: toNum(proposed[row.id]) }));
    }

    function renderSelectedOptions(rows) {
      const selected = selectedCandidateRows(rows);
      $("selectedOptions").innerHTML = selected.length ? selected.map(row => (
        `<div class="selected-item"><strong>${esc(row.underlying)} ${esc(row.expiry)} ${esc(row.right)} ${num(row.strike, 3)} × ${num(row.proposedQuantity, 0)}</strong><span>credit ${num(row.estimatedCredit, 5)} · Δ ${num(row.delta, 3)} · Γ ${num(row.gamma, 4)} · Θ ${num(row.theta, 4)}</span></div>`
      )).join("") : `<div class="note">在左侧期权链输入数量后，这里会列出新增期权。</div>`;
    }

    function renderAfterDte(positions, rows, cfg) {
      const added = selectedCandidateRows(rows).map(row => ({
        ...row,
        position: -row.proposedQuantity,
        contracts: row.proposedQuantity,
        remainingPremium: row.proposedQuantity * row.estimatedCredit * (cfg.multiplier[row.underlying] || 1000)
      }));
      const combined = positions.concat(added);
      const totalPremium = sum(combined, "remainingPremium");
      const totalGamma = combined.reduce((acc, row) => acc + Math.abs(row.position * row.gamma), 0);
      const totalTheta = combined.reduce((acc, row) => acc + Math.abs(row.position * row.theta), 0);
      renderTable("afterDteTable", groupInventory(combined, row => row.bucket, totalPremium, totalGamma, totalTheta, dteGroupSort), ["key", "contracts", "remainingPremium", "deltaExposure", "gammaExposure", "thetaExposure"], {
        key: "DTE分组", contracts: "张数", remainingPremium: "权利金", deltaExposure: "Delta", gammaExposure: "Gamma", thetaExposure: "Theta"
      });
    }

    function renderNodes(positions, rows, cfg) {
      const nodes = new Map();
      const totalPremium = sum(positions, "remainingPremium");
      positions.forEach(row => {
        const node = nodes.get(row.node) || { node: row.node, current: 0, proposed: 0, premium: 0, delta: 0, gamma: 0, theta: 0, vega: 0, warnings: [] };
        node.current += row.contracts;
        node.premium += row.remainingPremium;
        node.delta += Math.abs(row.position * row.delta);
        node.gamma += Math.abs(row.position * row.gamma);
        node.theta += Math.abs(row.position * row.theta);
        node.vega += Math.abs(row.position * row.vega);
        nodes.set(row.node, node);
      });
      rows.forEach(row => {
        const qty = toNum(proposed[row.id]);
        if (!(qty > 0)) return;
        const node = nodes.get(row.node) || { node: row.node, current: 0, proposed: 0, premium: 0, delta: 0, gamma: 0, theta: 0, vega: 0, warnings: [] };
        node.proposed += qty;
        nodes.set(row.node, node);
      });
      const gammaTotal = Array.from(nodes.values()).reduce((acc, row) => acc + row.gamma, 0);
      const nodeRows = Array.from(nodes.values()).map(row => {
        const premiumWeight = row.premium / Math.max(totalPremium, EPS);
        const gammaWeight = row.gamma / Math.max(gammaTotal, EPS);
        const warnings = [];
        if (premiumWeight > 0.25) warnings.push("该节点正在变得集中");
        if (gammaWeight > 0.35) warnings.push("该节点主导 Gamma 暴露");
        if (row.proposed > 0 && premiumWeight > 0.15) warnings.push("加入这里会增加行权节点集中度");
        if (row.proposed > 0 && premiumWeight < 0.10) warnings.push("加入这里有助于改善分布平衡");
        return { ...row, after: row.current + row.proposed, premiumWeight, gammaWeight, warnings };
      }).sort((a, b) => b.after - a.after).slice(0, 80);
      const selected = selectedCandidateRows(rows).map(row => ({
        ...row,
        position: -row.proposedQuantity,
        contracts: row.proposedQuantity,
        remainingPremium: row.proposedQuantity * row.estimatedCredit * (cfg.multiplier[row.underlying] || 1000),
        localSymbol: `新增 ${row.proposedQuantity} 张`
      }));
      $("nodeTable").innerHTML = optionChainHtml(positions.concat(selected), cfg, { editable: false, showGreeks: false, futures: futurePositions });
      const warningItems = nodeRows.flatMap(row => row.warnings.map(warning => `${row.node}: ${warning}`));
      $("warnings").innerHTML = warningItems.length
        ? warningItems.map(item => `<div class="warning">${esc(item)}<br><span class="note">提示只做可视化，不会禁止你覆盖。</span></div>`).join("")
        : `<div class="note">暂无节点集中提示。所有提示都允许手动覆盖。</div>`;
    }

    function renderTable(id, rows, cols, labels) {
      const head = cols.map(col => `<th class="${isTextCol(col) ? "text" : ""}">${esc(labels[col] || col)}</th>`).join("");
      const body = rows.map(row => `<tr>${cols.map(col => tableCell(col, row[col])).join("")}</tr>`).join("");
      $(id).innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body || emptyRow(cols.length)}</tbody></table>`;
    }

    function tableCell(col, value) {
      if (Array.isArray(value)) return `<td class="text">${value.map(item => `<span class="badge amber">${esc(item)}</span>`).join(" ")}</td>`;
      if (isTextCol(col)) return `<td class="text">${esc(value ?? "")}</td>`;
      if (["premium", "remainingPremium", "margin", "pnl", "deltaPart", "gammaPart", "vegaPart"].includes(col)) return `<td>${money(value)}</td>`;
      if (String(col).includes("Weight")) return `<td>${pct(value)}</td>`;
      if (typeof value === "number") {
        if (["contracts", "current", "proposed", "after"].includes(col)) return `<td>${num(value, 0)}</td>`;
        if (/Delta|Gamma|Theta|Vega|netDelta|netGamma|netTheta|netVega/.test(col)) return `<td>${num(value, 2)}</td>`;
        return `<td>${num(value, 3)}</td>`;
      }
      return `<td>${esc(value ?? "")}</td>`;
    }

    function emptyRow(colspan) {
      return `<tr><td class="text" colspan="${colspan}">暂无数据</td></tr>`;
    }

    function isTextCol(col) {
      return ["label", "name", "key", "node", "worstNode", "worstExpiry", "worstSide", "warnings"].includes(col);
    }

    function exportPlan() {
      const selected = candidates.filter(row => toNum(proposed[row.id]) > 0).map(row => ({ ...row, proposedQuantity: toNum(proposed[row.id]) }));
      return {
        generatedAt: new Date().toISOString(),
        config: config(),
        selected,
        exposure: { before: exposureFromPositions(shortPositions), added: exposureFromCandidates(candidates, config()) }
      };
    }

    function exportMarkdown() {
      const plan = exportPlan();
      const selected = plan.selected.map(row => `- ${row.underlying} ${row.expiry} ${row.right} ${num(row.strike, 3)} x ${row.proposedQuantity}, 综合分 ${num(row.finalScore, 1)}`).join("\n") || "- 暂无手动选择";
      return `# 卖方期权库存手动规划\n\n生成时间：${plan.generatedAt}\n\n## 选中候选\n${selected}\n\n## 说明\n本导出不是交易建议，不会自动下单，也不会强制为了目标缺口开仓。\n`;
    }

    function exportCsv() {
      const selected = exportPlan().selected;
      const headers = ["underlying", "expiry", "dte", "right", "strike", "estimatedCredit", "delta", "gamma", "theta", "vega", "finalScore", "proposedQuantity"];
      const rows = selected.map(row => headers.map(header => csvCell(row[header])).join(","));
      return [headers.join(","), ...rows].join("\n");
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function downloadText(filename, text) {
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function metric(label, value, sub, tone = "blue") {
      return `<div class="metric ${tone}"><span>${esc(label)}</span><strong>${esc(value)}</strong><small>${esc(sub)}</small></div>`;
    }

    function captureRate(bucket) {
      if (bucket === "0DTE") return 0.45;
      if (bucket === "1DTE") return 0.55;
      if (bucket === "2DTE") return 0.58;
      const dte = dteFromLabel(bucket);
      if (dte <= 7) return 0.62;
      return 0.70;
    }

    function weightFor(rows, key, field) {
      const row = rows.find(item => item.key === key);
      return row ? row[field] || 0 : 0;
    }

    function strikeAllowed(strike, zone, right) {
      if (!zone) return true;
      return right === "P" ? strike <= zone[1] : strike >= zone[0];
    }

    function productOf(row) {
      const explicit = txt(row.underlying || row.product || row.symbol || row.root || row.tradingClass).toUpperCase();
      if (/^(ZF|ZN|ZC|ZT|TN|ZB|UB)$/.test(explicit)) return explicit;
      const candidates = [row.optionName, row.localSymbol, row.contract, row.description, row.name, row.conId].map(v => txt(v).toUpperCase()).filter(Boolean);
      for (const item of candidates) {
        const match = item.match(/\b(ZF|ZN|ZC|ZT|TN|ZB|UB)\b|^(ZF|ZN|ZC|ZT|TN|ZB|UB)[-\s_]|^(ZF|ZN|ZC|ZT|TN|ZB|UB)[FGHJKMNQUVXZ]\d\b/);
        if (match) return match[1] || match[2] || match[3];
        if (/^OZN/.test(item)) return "ZN";
        if (/^OZC/.test(item)) return "ZC";
      }
      return "";
    }

    function dteFromRow(row) {
      const raw = txt(row.expiry || row.expiration || row.lastTradeDateOrContractMonth).slice(0, 10).replace(/-/g, "");
      const fromExpiry = dteFromExpiry(raw);
      if (Number.isFinite(fromExpiry)) return fromExpiry;
      const explicit = toNum(row.DTE ?? row.dte);
      if (Number.isFinite(explicit)) return Math.round(explicit);
      return 999;
    }

    function dteFromExpiry(value) {
      const raw = txt(value).slice(0, 10).replace(/-/g, "");
      if (!/^\d{8}$/.test(raw)) return NaN;
      const expiry = new Date(Number(raw.slice(0, 4)), Number(raw.slice(4, 6)) - 1, Number(raw.slice(6, 8)));
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      return Math.round((expiry - today) / 86400000);
    }

    function dteLabel(dte) {
      if (!Number.isFinite(dte)) return "-";
      if (dte <= 0) return "0DTE";
      return `${Math.round(dte)}DTE`;
    }

    function expiryLabelFromExpiry(expiry) {
      return dteLabel(dteFromExpiry(expiry));
    }

    function dteFromLabel(label) {
      const match = txt(label).match(/^(-?\d+)DTE$/i);
      return match ? Number(match[1]) : 999;
    }

    function dateBandFor(expiry, dte) {
      const raw = txt(expiry).slice(0, 10).replace(/-/g, "");
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (/^\d{8}$/.test(raw)) {
        const expiryDate = new Date(Number(raw.slice(0, 4)), Number(raw.slice(4, 6)) - 1, Number(raw.slice(6, 8)));
        const day = today.getDay();
        const daysToSunday = day === 0 ? 0 : 7 - day;
        const thisWeekEnd = new Date(today);
        thisWeekEnd.setDate(today.getDate() + daysToSunday);
        const nextWeekEnd = new Date(thisWeekEnd);
        nextWeekEnd.setDate(thisWeekEnd.getDate() + 7);
        if (expiryDate <= thisWeekEnd) return "一周内";
        if (expiryDate <= nextWeekEnd) return "下周";
        return "其他";
      }
      if (dte <= 7) return "一周内";
      if (dte <= 14) return "下周";
      return "其他";
    }

    function dteGroupSort(a, b) {
      return dteFromLabel(a.key) - dteFromLabel(b.key);
    }

    function dateBandGroupSort(a, b) {
      const order = { "一周内": 0, "下周": 1, "其他": 2 };
      return (order[a.key] ?? 9) - (order[b.key] ?? 9);
    }

    function referencePriceFor(underlying, chain, positions, cfg, futures = []) {
      if (Number.isFinite(cfg.manualFuturePrice) && cfg.manualFuturePrice > 0) return { price: cfg.manualFuturePrice, source: "manual" };
      const savedFuturePrice = futurePriceRows
        .filter(row => txt(row.root || row.symbol).toUpperCase() === underlying)
        .map(row => firstNum(row.price, row.marketPrice, row.mid, row.last, row.close, row.bid, row.ask))
        .find(Number.isFinite);
      if (Number.isFinite(savedFuturePrice)) return { price: savedFuturePrice, source: "future_prices" };
      const futurePrice = futures.map(row => row.price).find(Number.isFinite);
      if (Number.isFinite(futurePrice)) return { price: futurePrice, source: "future-position" };
      const productRows = chain.filter(row => productOf(row) === underlying);
      const values = productRows.flatMap(row => [
        toNum(row.underlyingPrice),
        toNum(row.undPrice),
        toNum(row.futurePrice),
        toNum(row.futuresPrice),
        toNum(row.referencePrice),
        toNum(row.modelGreeks_undPrice),
        toNum(row.bidGreeks_undPrice),
        toNum(row.askGreeks_undPrice),
        toNum(row.lastGreeks_undPrice)
      ]).filter(Number.isFinite);
      if (values.length) return { price: values[values.length - 1], source: "chain" };
      const positionValues = positions.flatMap(row => [toNum(row.underlyingPrice), toNum(row.undPrice), toNum(row.referencePrice)]).filter(Number.isFinite);
      if (positionValues.length) return { price: positionValues[positionValues.length - 1], source: "positions" };
      return { price: NaN, source: "" };
    }

    function expirySortKey(value) {
      const text = txt(value).replace(/-/g, "").slice(0, 8);
      return /^\d{8}$/.test(text) ? Number(text) : Number.MAX_SAFE_INTEGER;
    }

    function normRight(value) {
      const raw = txt(value).toUpperCase();
      if (raw === "PUT") return "P";
      if (raw === "CALL") return "C";
      return raw.slice(0, 1);
    }

    function signedDelta(row, right) {
      let delta = firstNum(row.delta, row.modelGreeks_delta, row.bidGreeks_delta, row.askGreeks_delta, 0);
      if (right === "P" && delta > 0) delta *= -1;
      return delta;
    }

    function multiplierFor(row, underlying, cfg) {
      const value = toNum(row.multiplier);
      return Number.isFinite(value) && value > 0 ? value : (cfg.multiplier[underlying] || 1000);
    }

    function firstNum(...values) {
      for (const value of values) {
        const number = toNum(value);
        if (Number.isFinite(number)) return number;
      }
      return NaN;
    }

    function sum(rows, field) {
      return rows.reduce((acc, row) => acc + (Number.isFinite(row[field]) ? row[field] : 0), 0);
    }

    function toNum(value) {
      if (value === null || value === undefined) return NaN;
      if (typeof value === "number") return Number.isFinite(value) ? value : NaN;
      const text = String(value).replace(/[$,%]/g, "").replace(/,/g, "").trim();
      if (!text || /^nan$/i.test(text)) return NaN;
      const number = Number(text);
      return Number.isFinite(number) ? number : NaN;
    }

    function txt(value) {
      return value === null || value === undefined ? "" : String(value).trim();
    }

    function setError(message) {
      $("error").textContent = message || "";
    }

    function money(value) {
      return Number.isFinite(value) ? "$" + value.toLocaleString(undefined, { maximumFractionDigits: 0 }) : "-";
    }

    function pct(value) {
      return Number.isFinite(value) ? (value * 100).toFixed(1) + "%" : "-";
    }

    function num(value, digits = 2) {
      return Number.isFinite(value) ? value.toLocaleString(undefined, { minimumFractionDigits: digits, maximumFractionDigits: digits }) : "-";
    }

    function optPx(value) {
      return Number.isFinite(value) ? value.toLocaleString(undefined, { minimumFractionDigits: 5, maximumFractionDigits: 5 }) : "-";
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function metricLabel(metric) {
      return { finalScore: "综合分", estimatedCredit: "权利金", gamma: "Gamma", distributionScore: "分布分" }[metric] || metric;
    }

    function samplePositions() {
      return [
        { symbol: "ZF", secType: "FUT", position: 1, localSymbol: "ZFU6", marketValue: 107000, delta: 1 },
        { symbol: "ZF", secType: "FOP", position: -2, expiry: "20260706", strike: 106.5, right: "P", marketValue: -120, unrealizedPnL: 20, delta: -0.18, gamma: 0.08, theta: -0.02, vega: 0.01, localSymbol: "ZF1N6 P1065" },
        { symbol: "ZF", secType: "FOP", position: 1, expiry: "20260706", strike: 105.5, right: "P", marketValue: 20, delta: -0.08, gamma: 0.04, theta: -0.01, vega: 0.01, localSymbol: "ZF1N6 P1055" },
        { symbol: "ZN", secType: "FUT", position: -1, localSymbol: "ZNU6", marketValue: -111000, delta: 1 },
        { symbol: "ZN", secType: "FOP", position: -1, expiry: "20260706", strike: 111.5, right: "C", marketValue: -80, unrealizedPnL: -5, delta: 0.12, gamma: 0.05, theta: -0.01, vega: 0.02, localSymbol: "OZNN6 C1115" },
        { symbol: "ZC", secType: "FUT", position: 2, localSymbol: "ZCU6", marketValue: 42000, delta: 1 },
        { symbol: "ZC", secType: "FOP", position: -1, expiry: "20260717", strike: 420, right: "P", marketValue: -150, unrealizedPnL: 12, delta: -0.14, gamma: 0.03, theta: -0.02, vega: 0.04, localSymbol: "OZCU6 P420" }
      ];
    }

    function sampleChain() {
      const rows = [];
      for (const underlying of ["ZF", "ZN", "ZC"]) {
        const base = underlying === "ZF" ? 107 : underlying === "ZN" ? 111 : 420;
        const multiplier = PRODUCT_PRESETS[underlying].multiplier;
        for (const dte of [1, 2, 3, 4, 7, 12]) {
          const expiry = expiryFromToday(dte);
          for (const right of ["P", "C"]) {
            for (const delta of [0.06, 0.10, 0.16, 0.24, 0.32]) {
              const signed = right === "P" ? -delta : delta;
              const strike = right === "P" ? base - delta * (underlying === "ZC" ? 80 : 3) : base + delta * (underlying === "ZC" ? 80 : 3);
              const mid = underlying === "ZC" ? 1.1 + delta * 8 + dte * 0.06 : 0.003 + delta * 0.065 + dte * 0.00055;
              rows.push({
                symbol: underlying,
                expiry,
                dte,
                strike,
                right,
                bid: mid * 0.94,
                ask: mid * 1.06,
                mid,
                delta: signed,
                gamma: 0.04 + delta * 0.2 / Math.sqrt(dte),
                theta: -(0.001 + delta * 0.01),
                vega: 0.01 + delta * 0.02,
                multiplier,
                underlyingPrice: base,
                openInterest: 50 + dte * 5 + delta * 600,
                volume: dte + delta * 50,
                conId: `${underlying}-${right}-${dte}-${Math.round(delta * 100)}`
              });
            }
          }
        }
      }
      return rows;
    }

    function sampleFuturePrices() {
      return [
        { root: "ZF", month: "202609", localSymbol: "ZFU6", price: 107.0, priceSource: "sample" },
        { root: "ZN", month: "202609", localSymbol: "ZNU6", price: 111.0, priceSource: "sample" },
        { root: "ZC", month: "202609", localSymbol: "ZCU6", price: 420.0, priceSource: "sample" }
      ];
    }

    function expiryFromToday(dte) {
      const date = new Date();
      date.setDate(date.getDate() + dte);
      const yyyy = String(date.getFullYear());
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      return `${yyyy}${mm}${dd}`;
    }

    function sampleBars() {
      const rows = [];
      const bases = { ZF: 107, ZN: 111, ZC: 420 };
      for (const [symbol, base] of Object.entries(bases)) {
        let close = base;
        for (let i = 79; i >= 0; i--) {
          const date = new Date();
          date.setHours(date.getHours() - i);
          const drift = Math.sin(i / 5) * (symbol === "ZC" ? 0.8 : 0.03);
          const open = close;
          close = base + drift + Math.cos(i / 7) * (symbol === "ZC" ? 0.55 : 0.025);
          const high = Math.max(open, close) + (symbol === "ZC" ? 0.8 : 0.025);
          const low = Math.min(open, close) - (symbol === "ZC" ? 0.8 : 0.025);
          rows.push({
            symbol,
            date: date.toISOString(),
            open,
            high,
            low,
            close,
            volume: 100 + i * 3
          });
        }
      }
      return rows;
    }

    render();
  </script>
